<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .nlbl { font-size: 11px; color: #666; white-space: nowrap; }
  .chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .chip { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid #e0dfd8; cursor: pointer; background: #f5f5f3; color: #555; transition: all .1s; }
  .chip:hover { border-color: #aaa; }
  .chip.on { background: #0a0a0a; color: #b3f0d0; border-color: #0a0a0a; }

  .plan h3 { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #999; margin: 1rem 0 .3rem; padding-bottom: 3px; border-bottom: 1px solid #e0dfd8; }

  .plan ul { padding-left: 1.1rem; margin-bottom: .4rem; }

  .pbox { background: #0a0a0a; color: #b3f0d0; padding: .6rem .9rem; border-radius: 8px; font-family: monospace; font-size: 11.5px; margin: .35rem 0; line-height: 1.6; white-space: pre-wrap; }
  .tbadge { display: inline-block; background: #f0efea; border: 1px solid #e0dfd8; padding: 2px 7px; border-radius: 20px; font-size: 11px; color: #666; }
  .banner { margin: 0 1.5rem 2rem; background: #0a0a0a; border-radius: 8px; padding: .85rem 1.1rem; }

<body>
<div id="root"></div>
<script>
var WEEKS=[
  {num:1,label:"Week 1",theme:"I Just Started",goal:"Show curiosity and discovery",days:[
    {day:1,type:"Talking Head",topic:"Introduce yourself + why you're starting the 30-Day SHIFT Challenge"},
    {day:2,type:"Photo Post",topic:"1 career lesson that shaped you"},
    {day:3,type:"AI Image",topic:"Use SHIFT to create an image of your future goals"},
    {day:4,type:"Talking Head",topic:"A mistake that taught you an important lesson"},
    {day:5,type:"Quote/Graphic",topic:"Motivational post for entrepreneurs using SHIFT"},
    {day:6,type:"Talking Head",topic:"Personal branding — what you want to be known for"},
    {day:7,type:"Reflection",topic:"Biggest takeaway from Week 1"}
  ]},
  {num:2,label:"Week 2",theme:"Build Authority",goal:"Become known for something in your niche",days:[
    {day:8,type:"Talking Head",topic:"One unpopular opinion about your industry"},
    {day:9,type:"Educational",topic:"Teach beginners one thing about your industry"},
    {day:10,type:"AI Image",topic:"Create an image representing success in your niche"},
    {day:11,type:"Talking Head",topic:"3 mistakes people make in your industry"},
    {day:12,type:"Motivational",topic:"Discipline and consistency — why they matter"},
    {day:13,type:"Carousel",topic:"5 myths about your industry debunked"},
    {day:14,type:"Reflection",topic:"Weekly wins, lessons, and progress recap"}
  ]},
  {num:3,label:"Week 3",theme:"Create Curiosity",goal:"Get people asking questions",days:[
    {day:15,type:"Talking Head",topic:"Start with 'Most people don't realize…'"},
    {day:16,type:"AI Image",topic:"Create an aspirational image — explain the vision"},
    {day:17,type:"Talking Head",topic:"Tell a story about overcoming adversity"},
    {day:18,type:"Text/Carousel",topic:"Challenge a common belief in your industry"},
    {day:19,type:"Talking Head",topic:"A controversial but respectful opinion"},
    {day:20,type:"Talking Head",topic:"Why you started using SHIFT + what you've learned"},
    {day:21,type:"Recap Post",topic:"Wins, lessons, and growth from Week 3"}
  ]},
  {num:4,label:"Week 4",theme:"Invite People",goal:"Generate conversations — not sales pitches",days:[
    {day:22,type:"Talking Head",topic:"Creating multiple income streams — mention SHIFT naturally"},
    {day:23,type:"AI Image",topic:"My Future Vision — explain what you're building"},
    {day:24,type:"Talking Head",topic:"Leverage and why AI matters for entrepreneurs"},
    {day:25,type:"Lifestyle Photo",topic:"Time freedom — share your perspective"},
    {day:26,type:"Talking Head",topic:"How AI is changing business"},
    {day:27,type:"Talking Head",topic:"Your honest SHIFT experience so far"},
    {day:28,type:"Educational",topic:"Opportunities most people are ignoring"},
    {day:29,type:"Talking Head",topic:"Invite people to learn more — no pressure, no hype"},
    {day:30,type:"Celebration",topic:"Full 30-day recap: what you learned, created, and what's next"}
  ]}
];

var NICHES=["Business","Fitness","Wellness","Real Estate","Marketing","Personal Development","Lifestyle"];

// Pre-written plans for all 30 days. Each plan adapts by niche via a token replacement.
// {N} = niche name, {n} = niche lowercase
function plans(niche){
  var n=niche.toLowerCase();
  var N=niche;
  return {
1: '<h3>Content objective</h3><p>Introduce yourself authentically — who you are, what you do in <b>'+N+'</b>, and why you\'re committing to 30 days of building in public with SHIFT.</p><h3>Hook options</h3><div class="hbox">"Day 1 of documenting my journey publicly — here\'s why I\'m doing this…"</div><div class="hbox">"I just committed to 30 days of showing up for my '+N+' brand. Starting today."</div><h3>Post script / outline</h3><ul><li>Who you are and your background in '+N+'</li><li>What SHIFT is and why you\'re using it</li><li>What you hope to build or achieve in 30 days</li><li>Why you\'re documenting it publicly</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a short, warm personal bio for someone in the '+N+' space who is just starting to build their personal brand on social media. Keep it conversational and genuine, not salesy.</div><h3>Story content</h3><p>Screenshot your SHIFT dashboard on Day 1. Caption it: "Starting something new today."</p><h3>Engagement CTA</h3><p>"Are you building something right now? Drop it below — I want to know."</p><h3>Authenticity tips</h3><ul><li>Don\'t try to look polished — rawness builds trust on Day 1</li><li>Smile and speak like you\'re talking to one person</li><li>Keep it under 90 seconds</li></ul><span class="tbadge">⏱ 20 min</span>',

2: '<h3>Content objective</h3><p>Build relatability by sharing a real lesson from your '+N+' journey. People connect with experience, not credentials.</p><h3>Hook options</h3><div class="hbox">"The one lesson from '+N+' that changed how I see everything…"</div><div class="hbox">"Nobody told me this when I started in '+N+'. I had to learn it the hard way."</div><h3>Post script / outline</h3><ul><li>Share the lesson in one clear sentence</li><li>Tell the story behind how you learned it</li><li>Explain how it applies to anyone in '+N+'</li><li>End with what you used SHIFT to create today</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a compelling Instagram caption about a hard-earned lesson in '+N+'. Make it feel personal, honest, and useful for beginners. End with an open question.</div><h3>Story content</h3><p>Behind-the-scenes photo of you working or creating content. Caption: "Creating today\'s post using SHIFT."</p><h3>Engagement CTA</h3><p>"What\'s the biggest lesson your career has taught you? I\'d love to hear it."</p><h3>Authenticity tips</h3><ul><li>Use a real photo — your desk, your environment, your world</li><li>The messier and more real, the better</li><li>One lesson only — don\'t dilute it</li></ul><span class="tbadge">⏱ 20 min</span>',

3: '<h3>Content objective</h3><p>Show the creative power of SHIFT by generating a visual that represents your future goals in '+N+'. Let the image do the talking.</p><h3>Hook options</h3><div class="hbox">"I asked AI to visualize my future in '+N+'. This is what it created…"</div><div class="hbox">"Used SHIFT to create this image. Here\'s what it means to me."</div><h3>Post script / outline</h3><ul><li>Share the AI-generated image</li><li>Explain what it represents for your '+N+' goals</li><li>Talk about where you\'re headed</li><li>Mention it took 3 minutes with SHIFT</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Create an inspiring, aspirational image that represents success and freedom for someone building a personal brand in '+N+'. Bright, motivating, forward-looking.</div><h3>Story content</h3><p>Poll your audience: "Would you use AI to create content for your '+N+' brand?" Yes / Still figuring it out</p><h3>Engagement CTA</h3><p>"What does your future look like in 3 years? Describe it below."</p><h3>Authenticity tips</h3><ul><li>Don\'t just post the image — tell the story behind it</li><li>Be specific about your goals, not vague</li><li>Vulnerability here builds massive connection</li></ul><span class="tbadge">⏱ 15 min</span>',

4: '<h3>Content objective</h3><p>Share a real mistake you made in '+N+' and what it taught you. Mistake content consistently outperforms highlight-reel content.</p><h3>Hook options</h3><div class="hbox">"I made a huge mistake in my '+N+' journey. Here\'s what it cost me — and what it taught me."</div><div class="hbox">"The '+N+' mistake I wish someone had warned me about…"</div><h3>Post script / outline</h3><ul><li>Name the mistake clearly and quickly</li><li>What happened as a result</li><li>The lesson you took from it</li><li>How you do things differently now</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a talking-head video script about a common mistake people make in '+N+' and the lesson it teaches. Conversational, honest tone. Under 90 seconds when spoken aloud.</div><h3>Story content</h3><p>Run a poll related to the mistake topic: "Have you ever made this mistake in '+N+'?" Yes / Not yet but I might</p><h3>Engagement CTA</h3><p>"What\'s a mistake you\'ve made that actually taught you something valuable? Share below."</p><h3>Authenticity tips</h3><ul><li>The more specific the mistake, the more trust it builds</li><li>Don\'t over-explain or justify — own it</li><li>End on the lesson, not the regret</li></ul><span class="tbadge">⏱ 20 min</span>',

5: '<h3>Content objective</h3><p>Create a motivational graphic using SHIFT that speaks directly to entrepreneurs and builders in the '+N+' space.</p><h3>Hook options</h3><div class="hbox">"Made this in 3 minutes using AI. Save it for when you need it."</div><div class="hbox">"This quote has been living in my head rent-free. Sharing it today."</div><h3>Post script / outline</h3><ul><li>Share the graphic or quote image made with SHIFT</li><li>Write 2-3 sentences on why this resonates with you personally</li><li>Connect it to the '+N+' journey specifically</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Design a motivational quote graphic for entrepreneurs in the '+N+' industry. The quote should be about consistency, showing up, and building something meaningful. Clean, bold design.</div><h3>Story content</h3><p>Show yourself using SHIFT to create the graphic. Short screen recording or photo.</p><h3>Engagement CTA</h3><p>"Save this if you needed the reminder today. And tell me — what keeps you going?"</p><h3>Authenticity tips</h3><ul><li>Add your personal take — don\'t just post a quote</li><li>Tag it to a real moment in your week</li><li>Authenticity + motivation = high saves</li></ul><span class="tbadge">⏱ 15 min</span>',

6: '<h3>Content objective</h3><p>Define your personal brand in '+N+'. Tell your audience exactly what you want to be known for and why it matters to you.</p><h3>Hook options</h3><div class="hbox">"If you only remember one thing about me, I want it to be this…"</div><div class="hbox">"I spent years in '+N+' before I figured out what I actually wanted to stand for."</div><h3>Post script / outline</h3><ul><li>State clearly what you want to be known for in '+N+'</li><li>Why that specific thing matters to you</li><li>Who you want to help</li><li>What you\'re building toward</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a personal brand statement for someone in the '+N+' space. It should clearly state who they help, how they help them, and what makes their perspective unique. Confident but not arrogant.</div><h3>Story content</h3><p>Question box: "What do you want to be known for?" Invite your audience to share their answer too.</p><h3>Engagement CTA</h3><p>"What do YOU want to be known for? Drop it in the comments — I\'ll read every one."</p><h3>Authenticity tips</h3><ul><li>Be specific — "helping people" is too vague</li><li>This is one of your most important pieces all month — take your time</li><li>Speak from conviction, not performance</li></ul><span class="tbadge">⏱ 20 min</span>',

7: '<h3>Content objective</h3><p>Reflect on Week 1 — what you created, what surprised you, and what momentum feels like. Reflection posts build deep trust.</p><h3>Hook options</h3><div class="hbox">"7 days in. Here\'s what I\'ve learned about building a brand in '+N+' using AI…"</div><div class="hbox">"Week 1 done. Honest reflection on what worked, what didn\'t, and what\'s next."</div><h3>Post script / outline</h3><ul><li>What you set out to do this week</li><li>What you actually created using SHIFT</li><li>One thing that surprised you</li><li>What you\'re taking into Week 2</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a reflective end-of-week social media post for someone in '+N+' who just completed their first week of a 30-day content challenge. Honest, encouraging, forward-looking.</div><h3>Story content</h3><p>Share your stats — views, followers, engagement. Don\'t hide the real numbers. Authenticity wins.</p><h3>Engagement CTA</h3><p>"What\'s one thing YOU accomplished this week that you\'re proud of? Tell me."</p><h3>Authenticity tips</h3><ul><li>Share real numbers — even if they\'re small</li><li>Vulnerability in reflection posts earns long-term followers</li><li>Celebrate the action, not just the results</li></ul><span class="tbadge">⏱ 20 min</span>',

8: '<h3>Content objective</h3><p>Share a bold, unpopular opinion about the '+N+' industry. Contrarian content sparks conversation and fast-tracks authority.</p><h3>Hook options</h3><div class="hbox">"Unpopular opinion about '+N+': most people are thinking about this completely wrong."</div><div class="hbox">"I\'ll probably get pushback for this, but someone needs to say it about '+N+'…"</div><h3>Post script / outline</h3><ul><li>State the opinion clearly in the first sentence</li><li>Why most people believe the opposite</li><li>Your reasoning and evidence</li><li>Invite disagreement — it drives comments</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a bold talking-head video script sharing a contrarian opinion about the '+N+' industry. The opinion should be defensible but surprising. Confident, not aggressive tone.</div><h3>Story content</h3><p>Share the reaction you\'re expecting: "I know this might be controversial but…" Ask: "Agree or disagree?"</p><h3>Engagement CTA</h3><p>"Agree or disagree? I want to hear the other side — drop your take below."</p><h3>Authenticity tips</h3><ul><li>Pick something you genuinely believe — fake controversy falls flat</li><li>Stay respectful — challenge ideas, not people</li><li>This post type drives the most comments of the month</li></ul><span class="tbadge">⏱ 20 min</span>',

9: '<h3>Content objective</h3><p>Teach one specific, actionable thing about '+N+' to someone who is just starting out. Pure value builds loyal audiences.</p><h3>Hook options</h3><div class="hbox">"If I was starting in '+N+' from scratch today, this is the first thing I\'d learn."</div><div class="hbox">"Nobody explains this about '+N+'. Let me break it down simply."</div><h3>Post script / outline</h3><ul><li>Name the concept or skill clearly</li><li>Why it matters for beginners in '+N+'</li><li>Step-by-step explanation (keep it simple)</li><li>One practical action they can take today</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a beginner-friendly educational post about one foundational concept in '+N+'. Use simple language, a clear structure, and end with one actionable tip. Carousel or caption format.</div><h3>Story content</h3><p>Share the audience responses from yesterday\'s post. Screenshot and react to a comment.</p><h3>Engagement CTA</h3><p>"Save this for later. And tell me — what\'s the one thing about '+N+' you wish someone had taught you earlier?"</p><h3>Authenticity tips</h3><ul><li>Teach like you\'re explaining to a smart friend, not a student</li><li>One concept only — depth beats breadth</li><li>Use personal examples wherever possible</li></ul><span class="tbadge">⏱ 20 min</span>',

10: '<h3>Content objective</h3><p>Use SHIFT to create a powerful visual representing what success looks like in '+N+'. Let the image anchor your authority.</p><h3>Hook options</h3><div class="hbox">"This is what success in '+N+' looks like to me. I created this with AI in minutes."</div><div class="hbox">"I asked SHIFT to visualize what I\'m building in '+N+'. Here\'s what it created."</div><h3>Post script / outline</h3><ul><li>Share the image</li><li>Define what success means to YOU in '+N+' — be specific</li><li>What it takes to get there</li><li>Why you\'re committed to the path</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Create a powerful, aspirational image representing success in the '+N+' industry. Should feel achievable but exciting — not over the top. Professional, motivated energy.</div><h3>Story content</h3><p>Ask: "What does success look like for YOU in '+N+'?" Use the question box sticker.</p><h3>Engagement CTA</h3><p>"Define success in '+N+' in one sentence. Drop it below — I\'m genuinely curious."</p><h3>Authenticity tips</h3><ul><li>Your definition of success should be personal, not generic</li><li>Avoid clichés like "freedom" without specifics</li><li>The image + your words should feel cohesive</li></ul><span class="tbadge">⏱ 15 min</span>',

11: '<h3>Content objective</h3><p>Build credibility by naming 3 real mistakes you see people make in '+N+'. Warning content positions you as a trusted guide.</p><h3>Hook options</h3><div class="hbox">"3 mistakes I see people make in '+N+' constantly — and how to avoid them."</div><div class="hbox">"I made all 3 of these '+N+' mistakes before I figured things out. Save yourself the time."</div><h3>Post script / outline</h3><ul><li>Mistake 1 — name it, explain why people make it, how to avoid it</li><li>Mistake 2 — same structure</li><li>Mistake 3 — same structure</li><li>Close with one encouraging sentence</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a video script covering 3 common mistakes people make in '+N+'. For each mistake, explain why it happens and what to do instead. Conversational and non-judgmental tone.</div><h3>Story content</h3><p>Poll: "Have you made any of these mistakes?" Yes, all of them / Some / Starting fresh</p><h3>Engagement CTA</h3><p>"Which of these have you made? No judgment — we\'ve all been there. Comment below."</p><h3>Authenticity tips</h3><ul><li>Be specific — vague mistakes don\'t help anyone</li><li>Admit you made them too where relevant</li><li>3 is the magic number — don\'t go to 5 or 10</li></ul><span class="tbadge">⏱ 20 min</span>',

12: '<h3>Content objective</h3><p>Post a motivational message about discipline and consistency in '+N+'. This anchors your brand in long-term thinking.</p><h3>Hook options</h3><div class="hbox">"Consistency in '+N+' isn\'t about being perfect. It\'s about not stopping."</div><div class="hbox">"The people winning in '+N+' right now aren\'t the most talented. They\'re the most consistent."</div><h3>Post script / outline</h3><ul><li>Open with a bold statement about consistency</li><li>Connect it to the '+N+' journey specifically</li><li>Share your own relationship with discipline</li><li>End with a challenge or commitment</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a motivational post about discipline and consistency for someone building in the '+N+' space. Authentic, grounded tone — not hype. Should feel like advice from a trusted friend.</div><h3>Story content</h3><p>Share your own consistency habit: "Here\'s what I do every day to stay on track in '+N+'."</p><h3>Engagement CTA</h3><p>"What\'s your non-negotiable daily habit? The one thing you always do no matter what?"</p><h3>Authenticity tips</h3><ul><li>Only share habits you actually practice</li><li>Avoid toxic productivity vibes — keep it human</li><li>This content type gets saved and shared most</li></ul><span class="tbadge">⏱ 15 min</span>',

13: '<h3>Content objective</h3><p>Debunk 5 myths about '+N+' that hold people back. Myth-busting content builds authority and gets shared widely.</p><h3>Hook options</h3><div class="hbox">"5 myths about '+N+' that are keeping people stuck."</div><div class="hbox">"Everything you\'ve been told about '+N+' is probably wrong. Let me explain."</div><h3>Post script / outline</h3><ul><li>Myth 1 — state it, bust it</li><li>Myth 2 — state it, bust it</li><li>Myth 3 — state it, bust it</li><li>Myth 4 — state it, bust it</li><li>Myth 5 — state it, bust it</li><li>Close: "The truth is simpler than people think."</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a carousel post debunking 5 common myths about '+N+'. Each slide should name the myth, then replace it with the truth. Keep each point punchy and clear.</div><h3>Story content</h3><p>Ask: "Which of these myths did YOU believe before?" Use the poll sticker with two of the myths.</p><h3>Engagement CTA</h3><p>"Which myth surprised you most? Or is there one I missed? Drop it below."</p><h3>Authenticity tips</h3><ul><li>Pick myths you genuinely believed at some point — it makes the content real</li><li>Back the truth with a brief reason, not just assertion</li><li>Carousel format works best for this — swipe-worthy</li></ul><span class="tbadge">⏱ 20 min</span>',

14: '<h3>Content objective</h3><p>Reflect on Week 2 — where your authority is growing, what content landed, and what you\'re doubling down on in Week 3.</p><h3>Hook options</h3><div class="hbox">"2 weeks in. Here\'s what\'s actually working for my '+N+' brand — and what flopped."</div><div class="hbox">"Week 2 recap: the content I almost didn\'t post got the most engagement. Here\'s what I learned."</div><h3>Post script / outline</h3><ul><li>What you posted this week and which performed best</li><li>What surprised you about the response</li><li>One thing you\'re changing going into Week 3</li><li>Where your '+N+' authority is starting to grow</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a week 2 reflection video script for someone building their personal brand in '+N+'. Focus on real lessons, honest numbers, and growing confidence. Genuine and forward-looking.</div><h3>Story content</h3><p>Share your actual engagement numbers this week — even if small. Progress is progress.</p><h3>Engagement CTA</h3><p>"What content have YOU been enjoying most this week? Tell me what you want more of."</p><h3>Authenticity tips</h3><ul><li>Share actual metrics — follower count, views, replies</li><li>Celebrate small wins loudly</li><li>Audiences love watching real progress in real time</li></ul><span class="tbadge">⏱ 20 min</span>',

15: '<h3>Content objective</h3><p>Open a pattern-interrupt with "Most people don\'t realize…" and share a genuine insight from your '+N+' experience that stops the scroll.</p><h3>Hook options</h3><div class="hbox">"Most people in '+N+' don\'t realize that the thing they\'re avoiding is exactly what they need."</div><div class="hbox">"Most people don\'t realize how close they are to a breakthrough in '+N+'. Let me show you why."</div><h3>Post script / outline</h3><ul><li>Open with the "most people don\'t realize" hook</li><li>Explain the insight in detail</li><li>Give a real example from '+N+'</li><li>Tell them what to do differently</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a "most people don\'t realize" style video script for the '+N+' space. The insight should be genuinely surprising and useful. Keep it under 90 seconds when spoken.</div><h3>Story content</h3><p>Share a follow-up question: "Does this change how you think about '+N+'?" Yes/No poll.</p><h3>Engagement CTA</h3><p>"Did this land differently than you expected? Tell me your reaction below."</p><h3>Authenticity tips</h3><ul><li>The insight must be real — not recycled advice</li><li>Pause after the hook in your video for effect</li><li>This format performs exceptionally well as a reel</li></ul><span class="tbadge">⏱ 20 min</span>',

16: '<h3>Content objective</h3><p>Use SHIFT to create an aspirational image and share the vision behind it. Vision content creates emotional connection and curiosity.</p><h3>Hook options</h3><div class="hbox">"This image represents exactly where I\'m headed in '+N+'. Let me tell you why."</div><div class="hbox">"I created this with AI. It\'s the clearest picture I\'ve ever had of what I\'m building."</div><h3>Post script / outline</h3><ul><li>Share the image</li><li>Describe the specific vision it represents</li><li>Why this matters to you in '+N+'</li><li>What you\'re doing daily to move toward it</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Generate an aspirational, vision-board style image for someone building their dream life through '+N+'. Should feel personal, warm, and achievable — not flashy or over the top.</div><h3>Story content</h3><p>"What does YOUR vision look like?" — question box sticker. Share responses tomorrow.</p><h3>Engagement CTA</h3><p>"What\'s one image that represents your ideal future? Describe it below — I want to picture it with you."</p><h3>Authenticity tips</h3><ul><li>Get specific about the vision — vague aspirations don\'t resonate</li><li>Make it personal to your '+N+' journey, not generic</li><li>The more detailed your description, the more comments you\'ll get</li></ul><span class="tbadge">⏱ 15 min</span>',

17: '<h3>Content objective</h3><p>Share a story of overcoming adversity. Struggle stories build the deepest connection and are the most shared content type.</p><h3>Hook options</h3><div class="hbox">"There was a point in my '+N+' journey where I almost gave up. Here\'s what happened."</div><div class="hbox">"The hardest season of my life taught me the most important thing I know about '+N+'."</div><h3>Post script / outline</h3><ul><li>Set the scene — what was happening</li><li>The moment it got hardest</li><li>What you chose to do</li><li>What you learned and how it shaped your '+N+' path</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a personal storytelling video script about overcoming a challenge in the '+N+' space. Emotional but grounded. Should feel like a real conversation, not a motivational speech.</div><h3>Story content</h3><p>Share a quote from the story as a graphic. Something that captures the turning point.</p><h3>Engagement CTA</h3><p>"Has there been a moment in YOUR journey where you almost quit? You don\'t have to share details — just know you\'re not alone."</p><h3>Authenticity tips</h3><ul><li>Specificity is everything in storytelling — dates, places, feelings</li><li>Don\'t rush to the resolution — let people feel the struggle</li><li>This will be one of your highest-performing posts this month</li></ul><span class="tbadge">⏱ 20 min</span>',

18: '<h3>Content objective</h3><p>Challenge a widely-held belief in '+N+' that you disagree with. Belief-challenging content drives saves, shares, and long comment threads.</p><h3>Hook options</h3><div class="hbox">"Everyone in '+N+' says you need X to succeed. I think that\'s wrong. Here\'s why."</div><div class="hbox">"The advice everyone gives about '+N+' might actually be holding you back."</div><h3>Post script / outline</h3><ul><li>State the common belief clearly</li><li>Why most people accept it without question</li><li>Your counter-argument with specific reasoning</li><li>What to believe instead</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a carousel or text post that challenges a common piece of advice in '+N+'. Present the conventional wisdom, then make the case for a different approach. Confident but fair tone.</div><h3>Story content</h3><p>Share two opposing views as a poll: "[Common belief]" vs "[Your belief]" — let your audience vote.</p><h3>Engagement CTA</h3><p>"Do you agree or disagree? I genuinely want to hear the other side on this one."</p><h3>Authenticity tips</h3><ul><li>Challenge ideas, never people</li><li>Be willing to be wrong — say so upfront if it\'s a strong opinion</li><li>The best content here invites real debate</li></ul><span class="tbadge">⏱ 20 min</span>',

19: '<h3>Content objective</h3><p>Share a controversial but respectful take on something in '+N+'. Respectful controversy is the fastest path to being remembered.</p><h3>Hook options</h3><div class="hbox">"Hot take on '+N+': I don\'t think most people are actually ready for what they say they want."</div><div class="hbox">"I\'ve been afraid to say this about '+N+' for a while. Today I\'m saying it."</div><h3>Post script / outline</h3><ul><li>Acknowledge it\'s a strong opinion upfront</li><li>State the opinion clearly</li><li>Your reasoning — 2-3 specific points</li><li>Invite pushback with genuine openness</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a video script for a respectful but controversial opinion about '+N+'. The take should be something the speaker genuinely believes. Acknowledge it\'s not a popular view. Open tone.</div><h3>Story content</h3><p>"What\'s YOUR controversial opinion about '+N+'?" — question box. Share the best responses anonymously.</p><h3>Engagement CTA</h3><p>"Respectfully — do you agree or disagree? Tell me your honest take. I won\'t bite."</p><h3>Authenticity tips</h3><ul><li>Only share opinions you\'d defend in a real conversation</li><li>Acknowledge the other side — it shows maturity</li><li>Never controversial for shock value — always for truth</li></ul><span class="tbadge">⏱ 20 min</span>',

20: '<h3>Content objective</h3><p>Give an honest update on your SHIFT experience so far — 20 days in. Authentic product experiences build more trust than any promotion.</p><h3>Hook options</h3><div class="hbox">"20 days of using SHIFT to build my '+N+' brand. Here\'s my honest take."</div><div class="hbox">"Day 20. Here\'s what surprised me most about using AI for my '+N+' content."</div><h3>Post script / outline</h3><ul><li>Why you started using SHIFT</li><li>What you\'ve created so far</li><li>What surprised you — positive and honest</li><li>How it\'s changed your approach to '+N+' content</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write an honest, conversational video script reviewing 20 days of using an AI content tool for building a personal brand in '+N+'. Share genuine observations — what worked, what was unexpected.</div><h3>Story content</h3><p>Show a before/after: content you made without SHIFT vs. content you made with it.</p><h3>Engagement CTA</h3><p>"Have you tried AI for your content yet? What\'s stopping you — or what\'s your experience been?"</p><h3>Authenticity tips</h3><ul><li>Be honest — share what you actually think, not a sales pitch</li><li>Specifics beat generalities: "it helped me write captions in 3 minutes" beats "it saves time"</li><li>Curiosity converts better than promotion — always</li></ul><span class="tbadge">⏱ 20 min</span>',

21: '<h3>Content objective</h3><p>Week 3 recap — share your wins, what you\'ve learned about yourself in '+N+', and what growth looks like at the halfway point.</p><h3>Hook options</h3><div class="hbox">"3 weeks in. I didn\'t expect '+N+' content creation to teach me this much about myself."</div><div class="hbox">"Week 3 done. Here\'s what\'s shifted — in my brand, my audience, and my mindset."</div><h3>Post script / outline</h3><ul><li>Content wins from Week 3</li><li>Something that surprised you about your audience in '+N+'</li><li>A mindset shift that happened this week</li><li>What you\'re excited about in Week 4</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a week 3 recap post for someone 21 days into a public content challenge in '+N+'. Focus on genuine growth, audience connection, and building momentum. Reflective but energized tone.</div><h3>Story content</h3><p>Share your 3-week numbers — even if small. Followers gained, posts made, engagement received.</p><h3>Engagement CTA</h3><p>"What growth have YOU seen in the last 3 weeks — in anything? I want to celebrate with you."</p><h3>Authenticity tips</h3><ul><li>Acknowledge what was hard — don\'t make it look easy</li><li>Real numbers, real feelings, real growth</li><li>Your audience is rooting for you — let them in</li></ul><span class="tbadge">⏱ 20 min</span>',

22: '<h3>Content objective</h3><p>Talk about building multiple income streams through '+N+'. Mention SHIFT naturally as one of the tools making it possible.</p><h3>Hook options</h3><div class="hbox">"One income stream in '+N+' isn\'t a business. It\'s a risk. Here\'s how I\'m thinking about this differently."</div><div class="hbox">"The '+N+' professionals who are thriving right now all have one thing in common — they\'re not relying on one thing."</div><h3>Post script / outline</h3><ul><li>Why single income streams are risky in '+N+'</li><li>The different streams you\'re building or exploring</li><li>How tools like SHIFT help you create more with less time</li><li>What this model looks like practically</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a video script about building multiple income streams in '+N+'. Practical, grounded advice. Mention how AI tools help with efficiency without making it the main focus.</div><h3>Story content</h3><p>"How many income streams do you currently have?" — Poll: 1 / 2-3 / 4+ / Working on it</p><h3>Engagement CTA</h3><p>"What income streams are you building or exploring right now? No judgment — share below."</p><h3>Authenticity tips</h3><ul><li>Speak from your own experience, not theory</li><li>SHIFT mention should feel natural — one tool among many</li><li>Avoid making this sound like a pitch — make it a conversation</li></ul><span class="tbadge">⏱ 20 min</span>',

23: '<h3>Content objective</h3><p>Share your "Future Vision" — use SHIFT to create an image and explain exactly what you\'re building in '+N+' and why.</p><h3>Hook options</h3><div class="hbox">"Here\'s what I\'m building in '+N+'. I made this vision board with AI and it gave me chills."</div><div class="hbox">"Day 23. My future vision for '+N+' — and why I\'m sharing it publicly."</div><h3>Post script / outline</h3><ul><li>Share the SHIFT-generated vision image</li><li>Describe specifically what you\'re building in '+N+'</li><li>Why this vision matters to you personally</li><li>What step you\'re taking this week toward it</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Create a vision board style image representing the ideal future life of someone building a successful '+N+' brand — a life of purpose, freedom, and impact. Warm and aspirational.</div><h3>Story content</h3><p>"I made this with SHIFT in under 5 minutes." Show the image + prompt you used.</p><h3>Engagement CTA</h3><p>"What are YOU building right now? I want to hear your vision — big or small."</p><h3>Authenticity tips</h3><ul><li>Be specific about what you\'re building — specificity is magnetic</li><li>Vulnerability about dreams creates powerful connection</li><li>This post plants seeds for your Day 29 invitation</li></ul><span class="tbadge">⏱ 15 min</span>',

24: '<h3>Content objective</h3><p>Explain leverage and why AI matters for '+N+' professionals. Position smart tools as the great equalizer — not a shortcut.</p><h3>Hook options</h3><div class="hbox">"The people winning in '+N+' right now understand leverage. Most people don\'t talk about this."</div><div class="hbox">"AI isn\'t replacing people in '+N+'. It\'s replacing people who don\'t use AI. Here\'s what I mean."</div><h3>Post script / outline</h3><ul><li>Define leverage in simple terms</li><li>How AI creates leverage specifically for '+N+' professionals</li><li>Real example from your own experience</li><li>What ignoring this means for people in '+N+'</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a video script explaining how AI tools create leverage for professionals in '+N+'. Make it practical and relatable — not tech-heavy. Focus on time, output, and opportunity.</div><h3>Story content</h3><p>"Do you use AI in your '+N+' work?" — Poll: Yes regularly / Tried it once / Not yet / Skeptical</p><h3>Engagement CTA</h3><p>"Where do YOU feel most stretched for time in your '+N+' work? That\'s usually where leverage helps most."</p><h3>Authenticity tips</h3><ul><li>Make it about outcomes, not tools</li><li>Use your own time savings as a concrete example</li><li>People in '+N+' care about results — lead with that</li></ul><span class="tbadge">⏱ 20 min</span>',

25: '<h3>Content objective</h3><p>Share a lifestyle moment connected to why time freedom matters to you in '+N+'. This humanizes your brand beyond the professional.</p><h3>Hook options</h3><div class="hbox">"This is why I\'m building what I\'m building in '+N+'. Not for the money — for this."</div><div class="hbox">"Time freedom looks different for everyone. Here\'s what it means to me."</div><h3>Post script / outline</h3><ul><li>Share a real lifestyle photo — a moment that matters to you</li><li>Connect it to why you\'re building in '+N+'</li><li>What time freedom actually looks like in your life now vs. your goal</li><li>What you\'re doing to close that gap</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a heartfelt caption about time freedom and why it matters for someone building in '+N+'. Personal, grounded, and honest — not aspirational hype. Connect it to real life moments.</div><h3>Story content</h3><p>Share the photo with a simple question: "What would you do with 3 extra hours a day?"</p><h3>Engagement CTA</h3><p>"What does time freedom mean to YOU? I\'m curious how different it looks for different people."</p><h3>Authenticity tips</h3><ul><li>Use a real, unpolished photo — not a stock image lifestyle</li><li>This is one of the most human posts of the month — let it be that</li><li>Connection here creates the relationship that drives Week 4</li></ul><span class="tbadge">⏱ 15 min</span>',

26: '<h3>Content objective</h3><p>Explain how AI is changing '+N+' right now — and why people who adapt early win. Educational authority content.</p><h3>Hook options</h3><div class="hbox">"AI is changing '+N+' faster than most people realize. Here\'s what\'s actually happening."</div><div class="hbox">"In 2 years, '+N+' will look completely different. Here\'s what I see coming."</div><h3>Post script / outline</h3><ul><li>What AI is changing specifically in '+N+'</li><li>What early adopters are gaining</li><li>What resisters are risking</li><li>What you\'re doing to stay ahead</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a video script explaining how AI is transforming the '+N+' industry. Cover what\'s changing, who it benefits, and what people should do now. Forward-thinking but grounded tone.</div><h3>Story content</h3><p>"How do you feel about AI in '+N+'?" — Poll: Excited / Cautious / Skeptical / Haven\'t thought about it</p><h3>Engagement CTA</h3><p>"What\'s your honest take on AI in '+N+'? I want to hear from people at every level of the conversation."</p><h3>Authenticity tips</h3><ul><li>Don\'t overstate AI — be measured and honest</li><li>Share what YOU\'ve personally experienced, not just theory</li><li>Balanced takes get more engagement than hype</li></ul><span class="tbadge">⏱ 20 min</span>',

27: '<h3>Content objective</h3><p>Give your honest, detailed review of using SHIFT for 27 days while building your '+N+' brand. This is your most powerful trust-building post.</p><h3>Hook options</h3><div class="hbox">"27 days using SHIFT. Here\'s my completely honest review — what I love, what I\'d change, and what surprised me."</div><div class="hbox">"I\'ve been documenting this experiment publicly. Today I\'m sharing everything I\'ve learned about using AI for '+N+' content."</div><h3>Post script / outline</h3><ul><li>What you were hoping SHIFT would do for your '+N+' content</li><li>What it actually did — specific examples</li><li>What surprised you most</li><li>Who you think it would be most useful for in '+N+'</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write an honest, detailed video script reviewing 27 days of using an AI content platform for building a '+N+' personal brand. Include what worked, what was unexpected, and genuine recommendations.</div><h3>Story content</h3><p>Show side-by-side: a piece of content from Day 1 vs. a recent one. Growth is visible.</p><h3>Engagement CTA</h3><p>"If you\'ve been curious about SHIFT, drop any questions below — I\'ll answer everything honestly."</p><h3>Authenticity tips</h3><ul><li>Don\'t make this a commercial — make it a conversation</li><li>Include something you\'d improve — it makes the positives more credible</li><li>This post will generate the most DMs of your 30 days</li></ul><span class="tbadge">⏱ 20 min</span>',

28: '<h3>Content objective</h3><p>Share a genuinely underutilized opportunity in '+N+' that most people are sleeping on. High-value insight content drives saves and shares.</p><h3>Hook options</h3><div class="hbox">"The '+N+' opportunity most people are ignoring right now. This won\'t be available forever."</div><div class="hbox">"If I was starting in '+N+' today, this is exactly where I\'d focus my energy."</div><h3>Post script / outline</h3><ul><li>Name the opportunity specifically</li><li>Why most people in '+N+' are missing it</li><li>What it looks like to take advantage of it</li><li>What you\'re personally doing about it</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write an educational post about an underutilized opportunity in '+N+' that most people overlook. Make the case clearly, practically, and with genuine insight. No hype — just real opportunity.</div><h3>Story content</h3><p>"Did you know about this opportunity?" — Poll: Yes, I\'m already on it / No, thanks for sharing / Interesting, need to learn more</p><h3>Engagement CTA</h3><p>"Are you already pursuing this? Or is this new information? Tell me where you\'re at."</p><h3>Authenticity tips</h3><ul><li>The opportunity must be real and specific — not vague FOMO</li><li>Share your own actions — it validates the insight</li><li>This post sets up tomorrow\'s invitation perfectly</li></ul><span class="tbadge">⏱ 20 min</span>',

29: '<h3>Content objective</h3><p>Extend a genuine, pressure-free invitation for people to learn more about SHIFT. No hype, no urgency, no pitch — just an open door.</p><h3>Hook options</h3><div class="hbox">"If you\'ve been watching this journey and wondering about SHIFT — here\'s the simple version."</div><div class="hbox">"Day 29. I said I\'d share more about SHIFT when the time was right. Today feels like the right time."</div><h3>Post script / outline</h3><ul><li>Acknowledge you\'ve been documenting your SHIFT journey for 29 days</li><li>What it\'s done for your '+N+' content in simple terms</li><li>Who it might be a good fit for</li><li>Soft close: "If you\'re curious, just send me a message — no pitch, just a conversation"</li></ul><h3>Recommended SHIFT prompt</h3><div class="pbox">Write a soft, genuine video script inviting people to learn more about an AI content tool after 29 days of using it publicly. No sales pressure. Focus on curiosity, not conversion. Conversational tone.</div><h3>Story content</h3><p>"Curious about SHIFT? Send me a DM — happy to answer any questions honestly."</p><h3>Engagement CTA</h3><p>"If you\'re curious about what SHIFT actually is, drop a comment or send me a message. I\'ll tell you exactly what I think."</p><h3>Authenticity tips</h3><ul><li>This is an invitation, not a sales pitch — keep that energy</li><li>You\'ve earned trust for 29 days — don\'t spend it on hype now</li><li>Curiosity converts. Pressure repels.</li></ul><span class="tbadge">⏱ 20 min</span>',

  h+='<div class="hdr"><div class="hdr-eye">30-Day Activation Protocol</div>';
  h+='<div class="hdr-title">SHIFT <span>Content</span> Planner</div>';
  h+='<div class="hdr-sub">Daily execution plans for all 30 days · pick your niche and go</div></div>';
  h+='<div class="wnav">';
  for(var i=0;i<WEEKS.length;i++){
    h+='<button class="wtab'+(i===S.week?' on':'')+'" data-wi="'+i+'">';
    h+='<span class="wtab-num">'+WEEKS[i].label+'</span><span>'+WEEKS[i].theme+'</span></button>';
  }
  h+='</div>';
  h+='<div class="wintro"><span class="gbadge">Goal</span><span class="gtext">'+w.goal+'</span></div>';
  h+='<div class="dgrid">';
  for(var j=0;j<w.days.length;j++){
    var day=w.days[j];
    h+='<div class="dcard'+(S.day===day.day?' on':'')+'" data-day="'+day.day+'">';
    h+='<div class="dnum">'+day.day+'</div><div class="dtype">'+day.type+'</div>';
    h+='<div class="dtopic">'+day.topic+'</div></div>';
  }
  h+='</div>';
  if(d){
    var planContent=plans(S.niche)[d.day]||'<p>Plan coming soon.</p>';
    h+='<div class="panel"><div class="phdr">';
    h+='<span class="dbadge">Day '+d.day+'</span>';
    h+='<div class="pinfo"><div class="ptitle">'+d.type+'</div><div class="pmeta">'+d.topic+'</div></div>';
    h+='</div><div class="nrow"><span class="nlbl">Your niche:</span><div class="chips">';
    for(var n=0;n<NICHES.length;n++){
      h+='<span class="chip'+(NICHES[n]===S.niche?' on':'')+'" data-niche="'+NICHES[n]+'">'+NICHES[n]+'</span>';
    }
    h+='</div></div><div class="out"><div class="plan">'+planContent+'</div></div></div>';
  }
  h+='<div class="banner"><p><strong>The SHIFT Rule:</strong> Don\'t sell SHIFT — show what it helped you create. Curiosity converts better than promotion.</p></div>';
  document.getElementById('root').innerHTML=h;
  document.querySelectorAll('.wtab').forEach(function(el){
    el.addEventListener('click',function(){S.week=parseInt(this.dataset.wi);S.day=null;render();});
  });
  document.querySelectorAll('.dcard').forEach(function(el){
    el.addEventListener('click',function(){S.day=parseInt(this.dataset.day);render();});
  });
  document.querySelectorAll('.chip').forEach(function(el){
    el.addEventListener('click',function(){S.niche=this.dataset.niche;render();});
  });
}
render();
</script>
</body>
</html>
