function copyText(txt){
  navigator.clipboard.writeText(txt).then(function(){
    var btns=document.querySelectorAll('.copy-btn');
    btns.forEach(function(b){b.textContent='Copied!';});
    setTimeout(function(){btns.forEach(function(b){b.textContent='Copy';});},2000);
  });
}

function render(){
  var w=WEEKS[S.week];
  var d=S.day!==null?w.days.find(function(x){return x.day===S.day;}):null;
  var key=d?S.day+"-"+S.niche:null;
  var plan=key?PLANS[key]:null;
  var h="";

  h+='<div class="hdr"><div class="hdr-eye">30-Day Activation Protocol</div>';
  h+='<div class="hdr-title">SHIFT Content Planner</div>';
  h+='<div class="hdr-sub">Pick a week · pick a day · pick your niche · done</div></div>';

  h+='<div class="wnav">';
  for(var i=0;i<WEEKS.length;i++){
    h+='<button class="wtab'+(i===S.week?" on":"")+'" data-wi="'+i+'">';
    h+='<span class="wtab-num">'+WEEKS[i].label+"</span><span>"+WEEKS[i].theme+"</span></button>";
  }
  h+="</div>";

  h+='<div class="wintro"><span class="gbadge">Focus</span><span class="gtext">'+w.goal+"</span></div>";

  h+='<div class="dgrid">';
  for(var j=0;j<w.days.length;j++){
    var day=w.days[j];
    h+='<div class="dcard'+(S.day===day.day?" on":"")+'" data-day="'+day.day+'">';
    h+='<div class="dnum">'+day.day+"</div>";
    h+='<div class="dtype">'+day.type+"</div>";
    h+='<div class="dtopic">'+day.topic+"</div></div>";
  }
  h+="</div>";

  if(d){
    h+='<div class="panel">';
    h+='<div class="phdr"><span class="dbadge">Day '+d.day+'</span>';
    h+='<div class="pinfo"><div class="ptitle">'+d.type+"</div>";
    h+='<div class="pmeta">'+d.topic+"</div></div></div>";
    h+='<div class="nrow"><span class="nlbl">Your niche:</span><div class="chips">';
    for(var n=0;n<NICHES.length;n++){
      h+='<span class="chip'+(NICHES[n]===S.niche?" on":"")+'" data-niche="'+NICHES[n]+'">'+NICHES[n]+"</span>";
    }
    h+="</div></div>";
    h+='<div class="out">';

    if(plan){
      // Hook
      h+='<div class="section"><div class="sec-label">Your Hook</div>';
      h+='<div class="hook-box" id="hook1">'+plan[0]+'</div>';
      h+='<div class="hook-box" id="hook2">'+plan[1]+'</div></div>';
      // SHIFT Prompt
      h+='<div class="section"><div class="sec-label">SHIFT Prompt — paste this into SHIFT Chat</div>';
      h+='<div class="prompt-box" id="shiftprompt">'+plan[2]+'</div>';
      h+='<button class="copy-btn" id="copybtn">Copy</button></div>';
      // CTA
      h+='<div class="section"><div class="sec-label">Your CTA — end every post with this</div>';
      h+='<div class="cta-box">'+plan[3]+'</div></div>';

      h+='<div class="section"><p style="color:#7a7570;font-size:13px">Select your niche above to see today\'s plan.</p></div>';
    }
    h+="</div></div>";
  }

  h+='<div class="banner"><p><strong>The SHIFT Rule:</strong> Don\'t sell SHIFT — show what it helped you create. Curiosity converts better than promotion.</p></div>';

  document.getElementById("root").innerHTML=h;

  document.querySelectorAll(".dcard").forEach(function(el){
    el.addEventListener("click",function(){S.day=parseInt(this.dataset.day);render();});
  });
  document.querySelectorAll(".chip").forEach(function(el){
    el.addEventListener("click",function(){S.niche=this.dataset.niche;render();});
  });

  var cb=document.getElementById("copybtn");

}
