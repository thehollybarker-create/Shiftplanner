<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIFT 30-Day Activation Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0d0d0f; color: #e8e6e0; min-height: 100vh; }
  .hdr { background: #0a0a0c; border-bottom: 1px solid #2a2520; padding: 1.4rem 1.5rem; }
  .hdr-eye { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #c9a84c; margin-bottom: 5px; }
  .hdr-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; background: linear-gradient(90deg, #a855f7, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; }
  .hdr-sub { font-size: 11px; color: #6b6560; margin-top: 3px; }
  .wnav { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 1rem 1.5rem; background: #0f0f12; border-bottom: 1px solid #2a2520; }
  .wtab { padding: .65rem .9rem; font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 8px; border: 1px solid #2a2520; background: #161618; color: #7a7570; text-align: left; transition: all .15s; line-height: 1.3; font-family: 'DM Sans', sans-serif; }
  .wtab:hover { border-color: #c9a84c; color: #e8e6e0; }
  .wtab.on { background: #1a1408; color: #c9a84c; border-color: #c9a84c; }
  .wtab-num { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; opacity: .6; display: block; margin-bottom: 1px; }
  .wtab.on .wtab-num { opacity: .8; }
  .wintro { padding: .85rem 1.5rem; background: #0f0f12; border-bottom: 1px solid #2a2520; }
  .wtheme { font-size: 11px; color: #c9a84c; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 3px; }
  .wdesc { font-size: 12px; color: #7a7570; line-height: 1.5; }
  .dgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 7px; padding: 1rem 1.5rem; }
  .dcard { background: #161618; border: 1px solid #2a2520; border-radius: 8px; padding: .7rem .8rem; cursor: pointer; transition: all .15s; position: relative; }
  .dcard:hover { border-color: #c9a84c; }
  .dcard.on { border-color: #c9a84c; background: #1a1408; }
  .dcard.double { border-color: #3b2d6b; }
  .dcard.double:hover { border-color: #a855f7; }
  .dcard.double.on { border-color: #a855f7; background: #140d1f; }
  .dcard.event { border-color: #1a3a20; }
  .dcard.event:hover { border-color: #4ade80; }
  .dcard.event.on { border-color: #4ade80; background: #0a1f0d; }
  .dpill { position: absolute; top: 6px; right: 6px; font-size: 8px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 2px 6px; border-radius: 10px; }
  .dpill.double { background: #3b2d6b; color: #a855f7; }
  .dpill.event { background: #1a3a20; color: #4ade80; }
  .dpill.series { background: #1a1408; color: #c9a84c; }
  .dnum { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; line-height: 1; margin-bottom: 3px; color: #e8e6e0; }
  .dcard.on .dnum { color: #c9a84c; }
  .dcard.double.on .dnum { color: #a855f7; }
  .dcard.event.on .dnum { color: #4ade80; }
  .dtype { font-size: 9.5px; font-weight: 500; color: #5a5550; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .dtopic { font-size: 11px; color: #7a7570; line-height: 1.35; }
  .legend { display: flex; gap: 12px; padding: .5rem 1.5rem .75rem; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #5a5550; }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; }
  .panel { margin: 0 1.5rem 1rem; border: 1px solid #2a2520; border-radius: 12px; overflow: hidden; background: #161618; }
  .phdr { padding: .9rem 1.1rem; border-bottom: 1px solid #2a2520; display: flex; align-items: flex-start; gap: 9px; flex-wrap: wrap; }
  .dbadge { background: #1a1408; color: #c9a84c; border: 1px solid #c9a84c; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; margin-top: 2px; }
  .pinfo { flex: 1; min-width: 0; }
  .ptitle { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 1px; color: #e8e6e0; }
  .pmeta { font-size: 11px; color: #7a7570; }
  .nrow { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; padding: .65rem 1.1rem; border-bottom: 1px solid #2a2520; }
  .nlbl { font-size: 11px; color: #7a7570; white-space: nowrap; }
  .chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .chip { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid #2a2520; cursor: pointer; background: #0f0f12; color: #7a7570; transition: all .1s; }
  .chip:hover { border-color: #c9a84c; color: #c9a84c; }
  .chip.on { background: #1a1408; color: #c9a84c; border-color: #c9a84c; }
  .out { padding: 1.25rem; }
  .post-block { background: #0f0f12; border: 1px solid #2a2520; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
  .post-block:last-child { margin-bottom: 0; }
  .post-block.p2 { border-color: #3b2d6b; }
  .post-block.event-block { border-color: #1a3a20; }
  .post-num { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #c9a84c; margin-bottom: .75rem; display: flex; align-items: center; gap: 6px; }
  .post-num.p2 { color: #a855f7; }
  .post-num.event-num { color: #4ade80; }
  .post-num::after { content: ''; flex: 1; height: 1px; background: #2a2520; }
  .sec-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #5a5550; margin: .85rem 0 .4rem; }
  .hook-box { background: #161618; border-left: 3px solid #c9a84c; border-radius: 0 6px 6px 0; padding: .65rem .9rem; font-size: 13px; font-style: italic; color: #e8e6e0; line-height: 1.6; margin-bottom: .4rem; }
  .hook-box.p2hook { border-left-color: #a855f7; }
  .hook-box.eventhook { border-left-color: #4ade80; }
  .prompt-box { background: #0a0a0c; border: 1px solid #2a2520; border-radius: 8px; padding: .8rem 1rem; font-family: monospace; font-size: 11.5px; color: #a855f7; line-height: 1.7; white-space: pre-wrap; }
  .copy-btn { margin-top: .5rem; padding: .35rem .85rem; background: #1a1408; border: 1px solid #c9a84c; border-radius: 6px; color: #c9a84c; font-size: 11px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .15s; }
  .copy-btn:hover { background: #c9a84c; color: #0a0a0c; }
  .cta-box { background: #161618; border: 1px solid #2a2520; border-radius: 6px; padding: .65rem .9rem; font-size: 13px; color: #e8e6e0; line-height: 1.6; }
  .life-box { background: #0a1f0d; border: 1px solid #1a3a20; border-radius: 6px; padding: .65rem .9rem; font-size: 12px; color: #7aaa80; line-height: 1.6; font-style: italic; margin-top: .75rem; }
  .life-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #4ade80; margin-bottom: 3px; }
  .series-tag { display: inline-block; background: #1a1408; border: 1px solid #c9a84c; color: #c9a84c; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-bottom: .6rem; letter-spacing: .05em; }
  .banner { margin: 0 1.5rem 2rem; background: #0a0a0c; border: 1px solid #2a2520; border-radius: 8px; padding: .85rem 1.1rem; }
  .banner p { font-size: 12px; color: #5a5550; line-height: 1.55; }
  .banner strong { color: #c9a84c; }
  @media(max-width:480px){ .wnav,.dgrid{padding:.75rem 1rem;} .panel,.banner{margin-left:1rem;margin-right:1rem;} }
</style>
</head>
<body>
<div id="root"></div>
<script>
var NICHES=["Business","Fitness","Wellness","Real Estate","Marketing","Personal Development","Lifestyle"];
var S={week:0,day:null,niche:"Business"};
var PLANS={};

// flags: double=2 posts, event=real life event day, series=part of series
var WEEKS=[
  {num:1,label:"Week 1",theme:"Excitement & Discovery",
   goal:"You just found something real. Announce it. Share the excitement. Use SHIFT Chat and Image every single day. Be the beginner — it's your biggest asset right now.",
   days:[
    {day:1,type:"Talking Head",topic:"Announce the 30-day SHIFT challenge",flags:[]},
    {day:2,type:"Double Post",topic:"Your story + your first SHIFT creation",flags:["double"]},
    {day:3,type:"Building in Public #1",topic:"Show SHIFT creating your content live",flags:["series"]},
    {day:4,type:"Talking Head + AI Image",topic:"A hard lesson + your vision in SHIFT",flags:["double"]},
    {day:5,type:"Event Day",topic:"Invite someone for coffee or a Zoom — document it",flags:["event"]},
    {day:6,type:"Building in Public #2",topic:"What SHIFT made today — the real process",flags:["series"]},
    {day:7,type:"Week 1 Finale",topic:"Honest recap + tease what's coming",flags:["double"]}
  ]},
  {num:2,label:"Week 2",theme:"Learning & Teaching",
   goal:"Teach your niche. Host real events. Show SHIFT doing the heavy lifting. Invite people to Zooms and coffee dates. The connection IS the content.",
   days:[
    {day:8,type:"Bold Opinion",topic:"The honest truth your industry won't say",flags:[]},
    {day:9,type:"Double Post",topic:"Teach one thing + show SHIFT writing it",flags:["double"]},
    {day:10,type:"Event Day",topic:"Host your first SHIFT Zoom or coffee date",flags:["event"]},
    {day:11,type:"Building in Public #3",topic:"3 mistakes — written live in SHIFT Chat",flags:["series"]},
    {day:12,type:"Vault Drop",topic:"Share something powerful from the SHIFT Vault",flags:[]},
    {day:13,type:"Double Post",topic:"Real life moment + ROI calculator reveal",flags:["double","event"]},
    {day:14,type:"Week 2 Recap",topic:"What you built, who you met, what changed",flags:[]}
  ]},
  {num:3,label:"Week 3",theme:"Curiosity & Connection",
   goal:"Make people wonder what you're using. Host real events. Show SHIFT as part of your actual life — not just your phone.",
   days:[
    {day:15,type:"Building in Public #4",topic:"Most people don't realize… made with SHIFT",flags:["series"]},
    {day:16,type:"Double Post",topic:"Vision image + the story behind it",flags:["double"]},
    {day:17,type:"Event Day",topic:"Dinner, hike or meetup — document the connection",flags:["event"]},
    {day:18,type:"Vault Drop + Opinion",topic:"Share from Vault + challenge a belief",flags:["double"]},
    {day:19,type:"Building in Public #5",topic:"Early adopter opportunity — made with SHIFT",flags:["series"]},
    {day:20,type:"Event Day",topic:"Host a Zoom — invite your most engaged followers",flags:["event"]},
    {day:21,type:"Week 3 Milestone",topic:"30 days building — the real story so far",flags:["double"]}
  ]},
  {num:4,label:"Week 4",theme:"Keep Building",
   goal:"This doesn't end at Day 30. Finish with more energy than you started. New studios are coming. The people watching you are ready. Give them a reason to take the next step.",
   days:[
    {day:22,type:"Building in Public #6",topic:"Early adopters always win — here's why",flags:["series"]},
    {day:23,type:"Double Post",topic:"3-year vision image + the daily reality",flags:["double"]},
    {day:24,type:"Event Day",topic:"Host a dinner or hike — film the energy",flags:["event"]},
    {day:25,type:"Honest Review",topic:"27 days with SHIFT — nothing held back",flags:[]},
    {day:26,type:"Double Post",topic:"What SHIFT is + who it's for",flags:["double"]},
    {day:27,type:"Vault Drop",topic:"The SHIFT content that moved you most",flags:[]},
    {day:28,type:"Event Day",topic:"Final Zoom — invite everyone who's been watching",flags:["event"]},
    {day:29,type:"Building in Public #7",topic:"The soft invite — no pitch, just truth",flags:["series"]},
    {day:30,type:"Day 30 Finale",topic:"What you built, who you became, what's next",flags:["double"]}
  ]}
];

// Helper
function bl(label,isP2,isEvent){
  var cls=isEvent?"event-num":isP2?"p2":"";
  return '<div class="post-num '+cls+'">'+label+'</div>';
}
function hook(text,isP2,isEvent){
  var cls=isEvent?" eventhook":isP2?" p2hook":"";
  return '<div class="hook-box'+cls+'">'+text+'</div>';
}
function prompt(text,id){
  return '<div class="prompt-box" id="prompt-'+id+'">'+text+'</div>'
    +'<button class="copy-btn" data-pid="'+id+'">Copy prompt</button>';
}
function cta(text){ return '<div class="cta-box">'+text+'</div>'; }
function life(text){ return '<div class="life-box"><div class="life-label">&#9670; Real Life Action</div>'+text+'</div>'; }
function series(text){ return '<div class="series-tag">&#9654; Building in Public Series</div>'; }
function post(num,label,isP2,isEvent,content){
  var bk=isEvent?"event-block":isP2?"p2":"";
  return '<div class="post-block '+bk+'">'+bl(label,isP2,isEvent)+content+'</div>';
}

// ── WEEK 1 ────────────────────────────────────────────────────────────────

// Day 1
NICHES.forEach(function(n){
  PLANS["1-"+n]=post(1,"Post — Talking Head",false,false,
    hook("I just found something and I cannot stop thinking about it. I'm doing a 30-day challenge and documenting every single day publicly. Here's why…",false,false)+
    hook("Day 1. I committed to 30 days of showing up and creating — using SHIFT as my only tool. Here's what I'm building and what I actually hope this becomes…",false,false)+
    '<div class="sec-label">SHIFT Prompt — paste into SHIFT Chat</div>'+
    prompt("Write a genuine, excited 60-second talking head script for someone in "+n+" announcing their 30-day SHIFT challenge publicly. They are NOT an expert — they're an early adopter who sees the opportunity and wants to share the journey. Warm, real, and full of energy. End with: 'Follow along — I'm showing everything. Day 2 tomorrow.'","1a-"+n)+
    '<div class="sec-label">Your CTA</div>'+
    cta("Comment 'IN' if you're following this. I post every single day for 30 days.")+
    life("Open SHIFT tonight. Explore Chat and Image. Don't create yet — just get comfortable. Tomorrow you go live.")
  );
});

// Day 2 - Double post
NICHES.forEach(function(n){
  PLANS["2-"+n]=
    post(1,"Post 1 — Your Story",false,false,
      hook("Before you see what I'm building, you need to know who I am and what brought me here…",false,false)+
      '<div class="sec-label">SHIFT Prompt</div>'+
      prompt("Write a compelling personal story caption for someone in "+n+" sharing their background honestly — what shaped them, what they've been through, and why this moment with SHIFT feels different. Real, specific, and ends with a question that invites followers to share their own story.","2a-"+n)+
      '<div class="sec-label">Your CTA</div>'+
      cta("What's brought you to where you are right now? Drop one line below.")
    )+
    post(2,"Post 2 — First SHIFT Creation",true,false,
      hook("I just used SHIFT for the first time. Here's what I created and what it made me feel…",true,false)+
      '<div class="sec-label">SHIFT Prompt</div>'+
      prompt("Create a bold, aspirational image representing the future vision of someone just starting their journey in "+n+". Powerful enough to make them stop scrolling. Then write a short caption revealing the image, explaining what prompted it, and inviting followers to imagine their own version.","2b-"+n)+
      '<div class="sec-label">Your CTA</div>'+
      cta("What would YOU create if you had an AI tool right now? Tell me.")+
      life("Share a behind-the-scenes Story of creating this image in SHIFT. Show the prompt you typed. People love the process.")
    );
});

// Day 3 - Building in Public #1
NICHES.forEach(function(n){
  PLANS["3-"+n]=post(1,"Building in Public #1 — The Process",false,false,
    series()+
    hook("I'm going to show you exactly how I create content using SHIFT. No cuts. No edits. The real thing…",false,false)+
    hook("Day 3. Building in Public. Watch me use SHIFT Chat to write today's post from scratch. Here's the prompt I used and what it created…",false,false)+
    '<div class="sec-label">SHIFT Prompt</div>'+
    prompt("Write a behind-the-scenes caption for someone in "+n+" showing their real process of using SHIFT Chat to create content. Include: what they typed into SHIFT, what it produced, what they changed, and why it took under 3 minutes. Ends with a question making people want to try it themselves.","3a-"+n)+
    '<div class="sec-label">Your CTA</div>'+
    cta("What's one piece of content you WISH you could create but never have time for? Tell me — I'll show you how SHIFT does it.")+
    life("Screenshot the actual SHIFT Chat conversation. Post that screenshot in your Stories with a poll: 'Would you try this?'")
  );
});

// Day 4 - Double post
NICHES.forEach(function(n){
  PLANS["4-"+n]=
    post(1,"Post 1 — The Lesson",false,false,
      hook("The mistake I made that I'm most grateful for. Nobody talks about this one…",false,false)+
      '<div class="sec-label">SHIFT Prompt</div>'+
      prompt("Write a candid 60-second talking head script for someone in "+n+" sharing a real failure — what happened, what it cost them, and the unexpected gift it gave them. Self-aware, human, and ultimately empowering. The kind of story people screenshot and send to friends.","4a-"+n)+
      '<div class="sec-label">Your CTA</div>'+
      cta("What's a mistake you made that turned out to be exactly what you needed?")
    )+
    post(2,"Post 2 — Vision Drop",true,false,
      hook("While I'm being honest today — here's what I'm actually building toward. I made this image in SHIFT…",true,false)+
      '<div class="sec-label">SHIFT Prompt</div>'+
      prompt("Create a striking visual image representing the bold future vision of someone in "+n+" — freedom, success, impact, and belonging. Then write 3 sentences explaining what the image means to them personally and what they're doing every day to close the gap between now and that future.","4b-"+n)+
      '<div class="sec-label">Your CTA</div>'+
      cta("Save this if it resonates. And tell me — what are you building toward?")+
      life("These two posts work together. Post the lesson in the morning. Drop the vision image in the evening. Let the vulnerability of Post 1 make Post 2 land harder.")
    );
});

// Day 5 - Event Day
NICHES.forEach(function(n){
  PLANS["5-"+n]=post(1,"Event Day — First Coffee or Zoom",false,true,
    hook("I just had the most unexpected conversation over coffee. SHIFT came up and everything changed…",false,true)+
    hook("Day 5. I invited someone I care about to a Zoom today. Not to pitch anything — just to share what I've been building. Here's what happened…",false,true)+
    '<div class="sec-label">SHIFT Prompt</div>'+
    prompt("Write a warm, genuine caption documenting a real first coffee date or Zoom call where the person shared their SHIFT journey with someone they care about. Not a pitch — a human moment. For someone in "+n+". The conversation, the reaction, the energy in the room. Ends with an invitation for others to reach out.","5a-"+n)+
    '<div class="sec-label">Your CTA</div>'+
    cta("If you're curious what I showed them — send me a message. I'll set up a coffee or Zoom with you too.")+
    life("This is your first real event. Invite 3 people this week — one coffee, one Zoom, one dinner. Not to sell. To share. Document every single one. This content outlasts everything else you post.")
  );
});

// Day 6 - Building in Public #2
NICHES.forEach(function(n){
  PLANS["6-"+n]=post(1,"Building in Public #2 — The Daily Reality",false,false,
    series()+
    hook("Day 6. Building in Public. Here's what SHIFT actually created for me today — including the prompt, the output, and what I thought of it…",false,false)+
    hook("This is what 20 minutes with SHIFT looks like in real life. No filters. No polish. Just the actual process…",false,false)+
    '<div class="sec-label">SHIFT Prompt</div>'+
    prompt("Write a raw, honest behind-the-scenes caption for someone in "+n+" sharing exactly what they created in SHIFT today — the prompt they used, what came out, what surprised them, and what they'd do differently. Short. Real. No performance.","6a-"+n)+
    '<div class="sec-label">Your CTA</div>'+
    cta("What would you use SHIFT to create today if you had 20 minutes? Tell me — I'll show you the exact prompt.")+
    life("Post a real screenshot or screen recording of SHIFT Chat in action. The less polished, the more authentic. Authenticity is the algorithm.")
  );
});

// Day 7 - Week 1 Finale Double
NICHES.forEach(function(n){
  PLANS["7-"+n]=
    post(1,"Post 1 — Week 1 Honest Recap",false,false,
      hook("One week in. Here's the honest truth about how it actually went…",false,false)+
      '<div class="sec-label">SHIFT Prompt</div>'+
      prompt("Write an honest, energized Week 1 recap caption for someone in "+n+" doing a 30-day SHIFT challenge. Share what they created with SHIFT Chat and Image, who they connected with, what surprised them, and what they got wrong. Real, not polished. Ends with a cliffhanger for Week 2.","7a-"+n)+
      '<div class="sec-label">Your CTA</div>'+
      cta("What's been your favourite post this week? Tell me — it literally shapes what I create next.")
    )+
    post(2,"Post 2 — The Week 2 Tease",true,false,
      hook("Week 2 starts tomorrow and it's going to be different. Here's what I'm planning…",true,false)+
      '<div class="sec-label">SHIFT Prompt</div>'+
      prompt("Write a short, punchy teaser caption for someone in "+n+" building excitement for Week 2 of their SHIFT challenge. Hint at teaching, real events, and going deeper without giving everything away. Creates genuine anticipation.","7b-"+n)+
      '<div class="sec-label">Your CTA</div>'+
      cta("Follow now if you haven't — Week 2 is when things get real.")+
      life("Stories today: share your best 3 moments from Week 1. Real reactions, SHIFT creations, your event. Let people feel what's been built in 7 days.")
    );
});

// ── WEEK 2 ────────────────────────────────────────────────────────────────

// Day 8
NICHES.forEach(function(n){
  PLANS["8-"+n]=post(1,"Bold Opinion — The Honest Take",false,false,
    hook("I'm going to say something about "+n+" that most people are too polished to admit publicly…",false,false)+
    hook("Unpopular opinion. Day 8 and I'm done playing it safe. Here's what I actually think…",false,false)+
    '<div class="sec-label">SHIFT Prompt</div>'+
    prompt("Write a bold, respectful 60-second talking head script sharing an honest opinion about "+n+" that most people won't say out loud. Backed by real experience. Not inflammatory — genuinely useful and slightly uncomfortable. Created with SHIFT Chat. Ends with an open invitation for real discussion.","8a-"+n)+
    '<div class="sec-label">Your CTA</div>'+
    cta("Agree or disagree? I want the real conversation — not the polished version.")+
    life("After this post, reply to every single comment personally. This is the post that starts relationships.")
  );
});

// Day 9 - Double
NICHES.forEach(function(n){
  PLANS["9-"+n]=
    post(1,"Post 1 — Teach Something Real",false,false,
      hook("If you're starting out in "+n+", here is the one concept nobody teaches early enough…",false,false)+
      '<div class="sec-label">SHIFT Prompt</div>'+
      prompt("Write a clear, valuable educational caption teaching the single most important foundational concept in "+n+" to someone just starting out. Written using SHIFT Chat. No jargon. Genuinely useful. Ends with: 'Save this. Share it with someone who needs it.'","9a-"+n)+
      '<div class="sec-label">Your CTA</div>'+
      cta("Save this and send it to someone in "+n+" who needs it. The thing nobody told you early enough.")
    )+
    post(2,"Post 2 — Show SHIFT Writing It",true,false,

    setTimeout(function(){btn.textContent="Copy prompt";},2000);
  });
}

function render(){
  var w=WEEKS[S.week];
  var d=S.day!==null?w.days.find(function(x){return x.day===S.day;}):null;
  var key=d?S.day+"-"+S.niche:null;
  var plan=key?PLANS[key]:null;
  var h="";

  h+='<div class="hdr"><div class="hdr-eye">30-Day Activation Protocol</div>';
  h+='<div class="hdr-title">SHIFT Content Planner</div>';
  h+='<div class="hdr-sub">Pick a week · pick a day · pick your niche · create</div></div>';

  h+='<div class="wnav">';
  for(var i=0;i<WEEKS.length;i++){
    h+='<button class="wtab'+(i===S.week?" on":"")+'" data-wi="'+i+'">';
    h+='<span class="wtab-num">'+WEEKS[i].label+"</span><span>"+WEEKS[i].theme+"</span></button>";
  }
  h+="</div>";
  h+='<div class="wintro"><div class="wtheme">'+w.theme+'</div><div class="wdesc">'+w.goal+'</div></div>';

  h+='<div class="legend">';
  h+='<div class="leg"><div class="leg-dot" style="background:#c9a84c"></div>Standard</div>';
  h+='<div class="leg"><div class="leg-dot" style="background:#a855f7"></div>Double post day</div>';
  h+='<div class="leg"><div class="leg-dot" style="background:#4ade80"></div>Real life event</div>';
  h+='<div class="leg"><div class="leg-dot" style="background:#c9a84c;opacity:.5"></div>Series</div>';
  h+="</div>";

  h+='<div class="dgrid">';
  for(var j=0;j<w.days.length;j++){
    var day=w.days[j];
    var flags=day.flags||[];
    var isDouble=flags.indexOf("double")>=0;
    var isEvent=flags.indexOf("event")>=0;
    var isSeries=flags.indexOf("series")>=0;
    var cls="dcard"+(S.day===day.day?" on":"")+(isDouble?" double":"")+(isEvent?" event":"");
    h+='<div class="'+cls+'" data-day="'+day.day+'">';
    if(isDouble) h+='<div class="dpill double">2 posts</div>';
    else if(isEvent) h+='<div class="dpill event">Event</div>';
    else if(isSeries) h+='<div class="dpill series">Series</div>';
    h+='<div class="dnum">'+day.day+"</div>";
    h+='<div class="dtype">'+day.type+"</div>";
    h+='<div class="dtopic">'+day.topic+"</div></div>";
  }
  h+="</div>";

  if(d){
    h+='<div class="panel">';
    h+='<div class="phdr"><span class="dbadge">Day '+d.day+'</span>';
    h+='<div class="pinfo"><div class="ptitle">'+d.type+"</div>";
    h+='<div class="pmeta">'+d.topic+"</div></div></div>";
    h+='<div class="nrow"><span class="nlbl">Your niche:</span><div class="chips">';
    for(var n=0;n<NICHES.length;n++){
      h+='<span class="chip'+(NICHES[n]===S.niche?" on":"")+'" data-niche="'+NICHES[n]+'">'+NICHES[n]+"</span>";
    }
    h+="</div></div>";
    h+='<div class="out">'+(plan||'<p style="color:#7a7570;font-size:13px;">Select your niche above.</p>')+"</div></div>";
  }

  h+='<div class="banner"><p><strong>The SHIFT Rule:</strong> Don\'t sell SHIFT — become SHIFT. Use it every day. Host real events. Build real friendships. The content is proof. The people are the product.</p></div>';

  document.getElementById("root").innerHTML=h;

  document.querySelectorAll(".wtab").forEach(function(el){
    el.addEventListener("click",function(){S.week=parseInt(this.dataset.wi);S.day=null;render();});
  });
  document.querySelectorAll(".dcard").forEach(function(el){
    el.addEventListener("click",function(){S.day=parseInt(this.dataset.day);render();});
  });
  document.querySelectorAll(".chip").forEach(function(el){
    el.addEventListener("click",function(){S.niche=this.dataset.niche;render();});
  });
  document.querySelectorAll(".copy-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      var pid=this.getAttribute("data-pid");
      var el=document.getElementById("prompt-"+pid);
      if(el) copyText(el.textContent,this);
    });
  });
}
render();
</script>
</body>
</html>
