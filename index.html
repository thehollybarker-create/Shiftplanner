<!DOCTYPE html>
<html lang="en">
<head>

<title>SHIFT 30-Day Activation Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0d0d0f; color: #e8e6e0; min-height: 100vh; }

  .hdr { background: #0a0a0c; border-bottom: 1px solid #2a2520; padding: 1.4rem 1.5rem; }
  .hdr-eye { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #c9a84c; margin-bottom: 5px; }
  .hdr-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; background: linear-gradient(90deg, #a855f7, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; }
  .hdr-sub { font-size: 11px; color: #6b6560; margin-top: 3px; }

  .wnav { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 1rem 1.5rem; background: #0f0f12; border-bottom: 1px solid #2a2520; }
  .wtab { padding: .65rem .9rem; font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 8px; border: 1px solid #2a2520; background: #161618; color: #7a7570; text-align: left; transition: all .15s; line-height: 1.3; font-family: 'DM Sans', sans-serif; }
  .wtab:hover { border-color: #c9a84c; color: #e8e6e0; }
  .wtab.on { background: #1a1408; color: #c9a84c; border-color: #c9a84c; }
  .wtab-num { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; opacity: .6; display: block; margin-bottom: 1px; }
  .wtab.on .wtab-num { opacity: .8; }

  .wintro { display: flex; align-items: center; gap: 8px; padding: .75rem 1.5rem; background: #0f0f12; border-bottom: 1px solid #2a2520; }
  .gbadge { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; background: #1a1408; color: #c9a84c; border: 1px solid #c9a84c; white-space: nowrap; }
  .gtext { font-size: 12px; color: #7a7570; }

  .dgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 7px; padding: 1rem 1.5rem; }
  .dcard { background: #161618; border: 1px solid #2a2520; border-radius: 8px; padding: .7rem .8rem; cursor: pointer; transition: all .15s; }
  .dcard:hover { border-color: #c9a84c; }
  .dcard.on { border-color: #c9a84c; background: #1a1408; }
  .dnum { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; line-height: 1; margin-bottom: 3px; color: #e8e6e0; }
  .dcard.on .dnum { color: #c9a84c; }
  .dtype { font-size: 9.5px; font-weight: 500; color: #5a5550; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .dtopic { font-size: 11px; color: #7a7570; line-height: 1.35; }

  .panel { margin: 0 1.5rem 1rem; border: 1px solid #2a2520; border-radius: 12px; overflow: hidden; background: #161618; }
  .phdr { padding: .9rem 1.1rem; border-bottom: 1px solid #2a2520; display: flex; align-items: flex-start; gap: 9px; flex-wrap: wrap; }
  .dbadge { background: #1a1408; color: #c9a84c; border: 1px solid #c9a84c; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; margin-top: 2px; }
  .pinfo { flex: 1; min-width: 0; }
  .ptitle { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 1px; color: #e8e6e0; }
  .pmeta { font-size: 11px; color: #7a7570; }

  .nrow { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; padding: .65rem 1.1rem; border-bottom: 1px solid #2a2520; }
  .nlbl { font-size: 11px; color: #7a7570; white-space: nowrap; }
  .chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .chip { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid #2a2520; cursor: pointer; background: #0f0f12; color: #7a7570; transition: all .1s; }
  .chip:hover { border-color: #c9a84c; color: #c9a84c; }
  .chip.on { background: #1a1408; color: #c9a84c; border-color: #c9a84c; }

  .out { padding: 1.1rem; }
  .plan { font-size: 13px; line-height: 1.8; color: #d4d0c8; }
  .plan h3 { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #5a5550; margin: 1rem 0 .35rem; padding-bottom: 3px; border-bottom: 1px solid #2a2520; }
  .plan h3:first-child { margin-top: 0; }
  .plan p { margin-bottom: .45rem; }
  .plan ul { padding-left: 1.1rem; margin-bottom: .45rem; }
  .plan li { margin-bottom: .25rem; }
  .hbox { background: #0f0f12; border-left: 3px solid #c9a84c; padding: .5rem .85rem; font-style: italic; margin: .35rem 0; font-size: 13px; color: #d4d0c8; }
  .pbox { background: #0a0a0c; border: 1px solid #2a2520; color: #a855f7; padding: .6rem .9rem; border-radius: 8px; font-family: monospace; font-size: 11.5px; margin: .35rem 0; line-height: 1.6; white-space: pre-wrap; }
  .tbadge { display: inline-block; background: #1a1408; border: 1px solid #c9a84c; padding: 2px 8px; border-radius: 20px; font-size: 11px; color: #c9a84c; margin-bottom: .5rem; }

  .banner { margin: 0 1.5rem 2rem; background: #0a0a0c; border: 1px solid #2a2520; border-radius: 8px; padding: .85rem 1.1rem; }
  .banner p { font-size: 12px; color: #5a5550; line-height: 1.55; }
  .banner strong { color: #c9a84c; }

  @media (max-width: 480px) {
    .wnav, .dgrid { padding: .75rem 1rem; }
    .panel, .banner { margin-left: 1rem; margin-right: 1rem; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
var WEEKS=[
  {num:1,label:"Week 1",theme:"I Just Started",goal:"Show curiosity and discovery",days:[
    {day:1,type:"Talking Head",topic:"Introduce yourself + why you're starting the 30-Day SHIFT Challenge"},
    {day:2,type:"Photo Post",topic:"1 career lesson that shaped you"},
    {day:3,type:"AI Image",topic:"Use SHIFT to create an image of your future goals"},
    {day:4,type:"Talking Head",topic:"A mistake that taught you an important lesson"},
    {day:5,type:"Quote/Graphic",topic:"Motivational post for entrepreneurs using SHIFT"},
    {day:6,type:"Talking Head",topic:"Personal branding — what you want to be known for"},
    {day:7,type:"Reflection",topic:"Biggest takeaway from Week 1"}
  ]},
  {num:2,label:"Week 2",theme:"Build Authority",goal:"Become known for something in your niche",days:[
    {day:8,type:"Talking Head",topic:"One unpopular opinion about your industry"},
    {day:9,type:"Educational",topic:"Teach beginners one thing about your industry"},
    {day:10,type:"AI Image",topic:"Create an image representing success in your niche"},
    {day:11,type:"Talking Head",topic:"3 mistakes people make in your industry"},
    {day:12,type:"Motivational",topic:"Discipline and consistency — why they matter"},
    {day:13,type:"Carousel",topic:"5 myths about your industry debunked"},
    {day:14,type:"Reflection",topic:"Weekly wins, lessons, and progress recap"}
  ]},
  {num:3,label:"Week 3",theme:"Create Curiosity",goal:"Get people asking questions",days:[
    {day:15,type:"Talking Head",topic:"Start with 'Most people don't realize…'"},
    {day:16,type:"AI Image",topic:"Create an aspirational image — explain the vision"},
    {day:17,type:"Talking Head",topic:"Tell a story about overcoming adversity"},
    {day:18,type:"Text/Carousel",topic:"Challenge a common belief in your industry"},
    {day:19,type:"Talking Head",topic:"A controversial but respectful opinion"},
    {day:20,type:"Talking Head",topic:"Why you started using SHIFT + what you've learned"},
    {day:21,type:"Recap Post",topic:"Wins, lessons, and growth from Week 3"}
  ]},
  {num:4,label:"Week 4",theme:"Invite People",goal:"Generate conversations — not sales pitches",days:[
    {day:22,type:"Talking Head",topic:"Creating multiple income streams — mention SHIFT naturally"},
    {day:23,type:"AI Image",topic:"My Future Vision — explain what you're building"},
    {day:24,type:"Talking Head",topic:"Leverage and why AI matters for entrepreneurs"},
    {day:25,type:"Lifestyle Photo",topic:"Time freedom — share your perspective"},
    {day:26,type:"Talking Head",topic:"How AI is changing business"},
    {day:27,type:"Talking Head",topic:"Your honest SHIFT experience so far"},
    {day:28,type:"Educational",topic:"Opportunities most people are ignoring"},
    {day:29,type:"Talking Head",topic:"Invite people to learn more — no pressure, no hype"},
    {day:30,type:"Celebration",topic:"Full 30-day recap: what you learned, created, and what's next"}
  ]}
];
var NICHES=["Business","Fitness","Wellness","Real Estate","Marketing","Personal Development","Lifestyle"];
var S={week:0,day:null,niche:"Business"};
var PLANS={};

function p(hooks,outline,prompt,story,cta,tips,time){
  return '<span class="tbadge">&#9201; '+time+'</span>'
    +'<h3>Hook options</h3>'+hooks.map(function(h){return '<div class="hbox">'+h+'</div>';}).join('')
    +'<h3>Post outline</h3><ul>'+outline.map(function(o){return '<li>'+o+'</li>';}).join('')+'</ul>'
    +'<h3>SHIFT prompt to use</h3><div class="pbox">'+prompt+'</div>'
    +'<h3>Story content</h3><p>'+story+'</p>'
    +'<h3>Engagement CTA</h3><p>'+cta+'</p>'
    +'<h3>Authenticity tips</h3><p>'+tips+'</p>';
}

PLANS["1-Business"]=p(["Day 1 of building my brand using AI — here's why I'm doing this publicly…","I just committed to 30 days of showing up online. Here's what I want to build…"],["Introduce yourself: name, what you do, who you help","Share the #1 reason you're starting this challenge now","What you hope to achieve in 30 days","One thing you want to be known for in your industry","End: 'Follow along — I'm documenting everything'"],"Write a 3-sentence bio for a business entrepreneur who helps [your audience] achieve [your result]. Keep it conversational, not corporate.","Screenshot your SHIFT dashboard. Caption: 'Starting something new today — follow along.'","Comment below: what's one thing you're working to build right now?","Film in one take. Imperfect is better than polished. People connect with real, not rehearsed.","15 min");
PLANS["1-Fitness"]=p(["Day 1 of documenting my fitness journey publicly — here's why I'm doing it…","I'm combining AI and fitness content for 30 days. Here's what I'm building…"],["Who you are and your fitness background","Why you're starting this challenge now","What transformation you're working toward or helping others achieve","How SHIFT is part of your content journey","End with: 'Come back tomorrow — I'm showing everything'"],"Write a short, energetic bio for a fitness coach who helps [your audience] get [specific result]. Conversational tone, no jargon.","Post a screenshot of SHIFT. Caption: 'Using AI to build my fitness brand — Day 1.'","Drop a comment: what's your current fitness goal?","Be specific about your fitness niche — weight loss, strength, running. Specificity builds faster audiences.","15 min");
PLANS["1-Wellness"]=p(["I'm documenting 30 days of building a wellness brand with AI — Day 1…","Why I decided to show up publicly every day for the next month…"],["Your name and wellness focus area","What drew you to wellness and helping others","Why you're starting this public challenge","What you want your audience to feel or achieve","Invite them to follow the journey"],"Write a warm, authentic bio for a wellness coach who guides [audience] toward [outcome]. Use calming, encouraging language.","Share your SHIFT dashboard with the caption: 'Documenting my wellness brand journey — Day 1 of 30.'","Tell me: what does feeling well mean to you in one word?","Wellness audiences value authenticity and calm energy. Speak slowly, smile, and be genuine.","15 min");
PLANS["1-Real Estate"]=p(["Day 1 of building my real estate brand publicly using AI — here's my why…","I just committed to 30 days of content. Here's what I want real estate to look like for my clients…"],["Your name, market, and how long you've been in real estate","Why you're showing up publicly now","What you want buyers/sellers to know about working with you","Your 30-day goal with this challenge","Call them to follow along"],"Write a confident but approachable bio for a real estate agent in [your market] who helps [buyers/sellers/investors] achieve [outcome].","Screenshot SHIFT. Caption: 'Building my real estate brand with AI — Day 1.'","Are you currently buying, selling, or just watching the market? Comment below.","Real estate is a trust business. Focus on your personality, not just your stats, on Day 1.","15 min");
PLANS["1-Marketing"]=p(["Day 1 of building my marketing brand in public — here's what I'm doing and why…","I'm documenting 30 days of AI-powered content creation starting today…"],["Your name and marketing specialty","Who you help and what results you get them","Why you're doing this challenge publicly","What people will learn from following you","End: 'Tag someone who needs better marketing'"],"Write a punchy, results-focused bio for a marketing expert who helps [audience] with [specific marketing outcome]. Keep it bold and direct.","Post your SHIFT dashboard. Caption: 'Day 1 — building my marketing brand with AI.'","What's your biggest marketing challenge right now? Drop it below.","Marketers are held to a higher standard — make sure your own content is compelling from Day 1.","15 min");
PLANS["1-Personal Development"]=p(["Day 1 of my 30-day public growth challenge — here's why I'm doing this…","I decided to stop waiting and start building. Here's what that looks like…"],["Who you are and what personal development means to you","The moment that changed how you think about growth","Why you're committing to 30 days publicly","What you hope others take away from following you","Invite them to join the journey"],"Write an inspiring bio for a personal development coach who helps [audience] break through [obstacle] and achieve [transformation].","Screenshot SHIFT. Caption: 'Day 1 of building something that matters — follow along.'","What's one belief you're working on changing right now?","Personal development content works best when it's vulnerable. Share something real on Day 1.","15 min");
PLANS["1-Lifestyle"]=p(["Day 1 of documenting my life and building a brand at the same time — here's the plan…","I'm going public for 30 days. Here's why and what you can expect…"],["Introduce your lifestyle and what makes it worth sharing","Why you're starting this challenge","What people will see over the next 30 days","The one thing you want to be known for","End: 'Come back tomorrow for Day 2'"],"Write a fun, personality-driven bio for a lifestyle creator who shares [their lifestyle focus] and inspires others to [outcome].","Post your SHIFT dashboard. Caption: 'Starting a 30-day content challenge today.'","What kind of content do you love seeing in your feed? Comment below.","Lifestyle content lives and dies by personality. Let yours shine from the very first video.","15 min");

var allNiches=["Business","Fitness","Wellness","Real Estate","Marketing","Personal Development","Lifestyle"];

var days2_30=[
  {day:2,hooks:["The best career lesson nobody taught me…","After years in this field, this one thing changed everything for me…"],outline:["Set up the lesson: what situation taught you this","What you believed before vs what you know now","How it changed the way you approach your work","How your audience can apply it today","Close with a reflective question"],prompt:"Write a compelling caption about a career lesson learned the hard way. Make it honest and relatable for [NICHE].",story:"Behind the scenes of creating this post in SHIFT. Show the process.",cta:"What's a lesson your career taught you that school never did?",tips:"Use a real story — even if it's uncomfortable. The more specific, the more it resonates.",time:"20 min"},
  {day:3,hooks:["I used SHIFT to create an image of what success looks like — here's what I made…","This AI-generated image represents exactly where I'm headed in the next 12 months…"],outline:["Show the image you created in SHIFT","Describe what it represents about your goals","Why visualizing your future matters","What you're actively working toward right now","Ask followers what their version of success looks like"],prompt:"Create a professional, inspiring image representing success and growth in [NICHE]. Bold and aspirational.",story:"Poll: 'Would you use AI to create content?' Yes / Not sure yet",cta:"What does your version of success look like? Describe it below.",tips:"Use the image as a conversation starter. Tell the story behind what it means to you.",time:"15 min"},
  {day:4,hooks:["The biggest mistake I made — and what it taught me…","If I could go back and tell myself one thing when I started…"],outline:["Set up the mistake: what happened and when","Why you made the decision you did at the time","What went wrong and what it cost you","The lesson you took away","How your audience can avoid making the same mistake"],prompt:"Write a candid lessons-learned post about a real mistake in [NICHE]. Honest, self-aware, and ultimately empowering.",story:"Run a poll related to the biggest challenge in your niche.",cta:"What's a mistake you've made that you're now grateful for?",tips:"Vulnerability about mistakes builds more trust than showcasing wins. Don't soften the story.",time:"15 min"},
  {day:5,hooks:["'Success isn't given. It's built — one decision at a time.'","'The people who last are built on value, not hype.'"],outline:["Open with the quote or graphic created in SHIFT","Share why this quote resonates with you personally","Connect it to a current challenge or season you're in","How your audience can apply this mindset today","End with an energizing call to action"],prompt:"Create a bold motivational graphic for [NICHE] professionals. Dark background, gold text, modern design.",story:"Show yourself using SHIFT to create the graphic. Caption: 'Made this in 2 minutes — Day 5.'",cta:"Save this post if it resonates — and tag someone who needs to see it.",tips:"The caption matters more than the graphic. Make the personal connection strong.",time:"15 min"},
  {day:6,hooks:["I want to be known as the person who makes [result] possible…","Here's what I'm building — and why I want my name attached to it…"],outline:["What you want to be known for — your specific expertise","Why you chose this niche or focus area","Who your ideal client or audience is","The gap in the market you're filling","Why it matters to you personally"],prompt:"Write a clear personal brand statement for someone in [NICHE]. Confident, specific, and memorable.",story:"Q&A box: 'What do you want help with most?' Use responses to guide future content.",cta:"What do you want to be known for? Comment below — I read every single one.",tips:"Personal branding isn't about being famous. It's about being the first person someone thinks of in your category.",time:"20 min"},
  {day:7,hooks:["A week into building in public — here's what I've learned so far…","Day 7 reflection: what worked, what didn't, and what I'm taking into Week 2…"],outline:["Your single biggest takeaway from Week 1","What surprised you most about showing up publicly","One thing that was harder than expected","One thing that was easier than expected","What you're most focused on going into Week 2"],prompt:"Write a reflection post about the first week of building a [NICHE] brand publicly. Honest, grounded, and forward-looking.",story:"Share your Week 1 stats or results — views, followers, engagement.",cta:"If you've been following along — what has resonated most with you this week?",tips:"Reflection posts build long-term audience trust. Be honest about the hard parts, not just the wins.",time:"20 min"},
  {day:8,hooks:["Unpopular opinion: most people in [industry] quit too early — here's why…","I'm going to say something that might make some people uncomfortable…"],outline:["State the unpopular opinion clearly upfront","Acknowledge why most people disagree","Share the evidence or experience behind your view","Why this opinion actually helps your audience","Invite respectful pushback in the comments"],prompt:"Write a provocative but respectful unpopular opinion post for [NICHE]. Bold, confident, and well-reasoned.",story:"Share the audience responses to this post throughout the day.",cta:"Agree or disagree? Tell me in the comments — respectful debate welcome.",tips:"Unpopular opinion posts work because they create conversation. Stand firm but stay open.",time:"20 min"},
  {day:9,hooks:["If you're new to [industry], the one thing you need to understand first is…","Most beginners skip this step — here's why it matters so much…"],outline:["Identify the single most important concept for beginners","Explain it in plain, simple language","Why most beginners misunderstand or skip it","A practical example or step they can use immediately","End with an encouraging message"],prompt:"Write a clear, beginner-friendly explainer about one fundamental concept in [NICHE]. No jargon.",story:"Share audience responses or questions from this post.",cta:"Save this for reference — and share it with someone just starting out.",tips:"Educational content that makes complex things simple earns saves and shares. Aim for clarity over cleverness.",time:"20 min"},
  {day:10,hooks:["This is what success in my field actually looks like — I created this with AI…","I used SHIFT to visualize what winning looks like in my industry…"],outline:["Reveal the AI image you created in SHIFT","Describe what the image represents specifically","What does success look like to you in this space?","How you're actively building toward it","Ask followers what success looks like for them"],prompt:"Create a powerful image representing success and achievement in [NICHE]. Professional and inspiring.",story:"Poll: 'What does success look like for you right now?' Thriving career / Health / Freedom / Relationships",cta:"Describe your version of success — I'd love to hear it.",tips:"Use this image as a mirror for your audience. Make the vision feel attainable.",time:"15 min"},
  {day:11,hooks:["The 3 mistakes I see people make in [industry] over and over again…","If you're in [niche], avoid these 3 common traps…"],outline:["Introduce the 3 mistakes briefly","Mistake #1 — what it is and why people make it","Mistake #2 — often related to impatience or misinformation","Mistake #3 — usually the hardest one to admit","Quick summary and the fix for each one"],prompt:"Write a practical post about 3 common mistakes in [NICHE] and how to avoid them. Direct and actionable.",story:"Share the comments and reactions throughout the day.",cta:"Which of these have you made? Comment the number — no judgment here.",tips:"'3 mistakes' posts get saved. Make each mistake specific enough to be instantly recognizable.",time:"20 min"},
  {day:12,hooks:["Discipline got me further than motivation ever did — here's why…","Nobody talks about what consistency actually costs — and what it pays back…"],outline:["Open with a truth about discipline that most people avoid","The difference between motivation and discipline","What your own consistency practice looks like day to day","The result that consistency has created in your life or work","A 7-day challenge for your audience"],prompt:"Write a motivational post about discipline and consistency in [NICHE]. Honest, grounded, and energizing.",story:"Show yourself doing your own daily habit. Keep it real.",cta:"What's one thing you're committing to do consistently for the next 7 days?",tips:"Discipline posts resonate most when they're honest about how hard it actually is.",time:"15 min"},
  {day:13,hooks:["5 myths about [industry] that are keeping people stuck…","The most common lies people believe about [niche] — debunked…"],outline:["Introduce the 5 myths briefly","Myth #1 — state it, then bust it","Myth #2 — usually a fear-based belief","Myth #3 — often from bad advice","Myth #4 — a common shortcut myth","Myth #5 — the most persistent one","Close with an empowering reframe"],prompt:"Write a myth-busting post debunking 5 common beliefs in [NICHE]. Each myth gets one clear counterpoint.",story:"Share reactions to the myths throughout the day.",cta:"Which myth surprised you most? Comment the number.",tips:"Myth-busting posts build authority fast. Make sure each 'bust' is specific and backed by real insight.",time:"25 min"},
  {day:14,hooks:["Week 2 done — here's what I built, what I learned, and what's next…","Halfway through my 30-day challenge. Here's the honest update…"],outline:["Your top win from Week 2","The most important thing you learned about your audience","What content performed best and why","What you're changing or doubling down on for Week 3","A message of gratitude to those following along"],prompt:"Write an honest Week 2 recap for someone building a [NICHE] brand in public. Reflective, results-focused, and forward-looking.",story:"Share your Week 2 analytics or engagement screenshots.",cta:"What content from the past 2 weeks has been most valuable to you?",tips:"Week 2 recaps reward your most loyal followers. Acknowledge them directly.",time:"20 min"},
  {day:15,hooks:["Most people don't realize how much this is actually costing them…","Most people don't realize that the way they're approaching this is the problem…"],outline:["Open with the 'most people don't realize' statement","The insight or truth behind it","What happens when people discover this truth","A story or example that makes it concrete","Invite followers to share what they didn't realize until it was pointed out"],prompt:"Write an eye-opening post that starts with 'Most people don't realize...' for [NICHE]. Insightful and memorable.",story:"Share reactions in your stories throughout the day.",cta:"What's something in your world that most people get completely wrong?",tips:"The 'most people don't realize' format works because it makes readers feel like insiders.",time:"20 min"},
  {day:16,hooks:["This image is the vision I'm chasing — I created it with AI in 2 minutes…","I asked SHIFT to create my aspirational future — here's what it made…"],outline:["Reveal the AI-generated aspirational image","Tell the story behind it — what you were thinking when you prompted SHIFT","What this vision means to you right now","The gap between where you are and where this image lives","How you're closing that gap every day"],prompt:"Create a breathtaking aspirational image representing the ultimate vision in [NICHE]. Beautiful, specific, and deeply motivating.",story:"Poll: 'Do you have a clear vision of where you're headed?' Yes / Getting clearer / Not yet",cta:"What vision are you chasing right now?",tips:"The story behind the image is more powerful than the image itself. Spend time on your caption.",time:"15 min"},

function render(){
  var w=WEEKS[S.week];
  var d=S.day!==null?w.days.find(function(x){return x.day===S.day;}):null;
  var key=d?S.day+"-"+S.niche:null;
  var h="";
  h+='<div class="hdr"><div class="hdr-eye">30-Day Activation Protocol</div>';
  h+='<div class="hdr-title">SHIFT Content Planner</div>';
  h+='<div class="hdr-sub">Daily execution plans for all 30 days · 7 niches</div></div>';
  h+='<div class="wnav">';
  for(var i=0;i<WEEKS.length;i++){
    h+='<button class="wtab'+(i===S.week?" on":"")+'" data-wi="'+i+'">';
    h+='<span class="wtab-num">'+WEEKS[i].label+"</span><span>"+WEEKS[i].theme+"</span></button>";
  }
  h+="</div>";
  h+='<div class="wintro"><span class="gbadge">Goal</span><span class="gtext">'+w.goal+"</span></div>";
  h+='<div class="dgrid">';
  for(var j=0;j<w.days.length;j++){
    var day=w.days[j];
    h+='<div class="dcard'+(S.day===day.day?" on":"")+'" data-day="'+day.day+'">';
    h+='<div class="dnum">'+day.day+"</div>";
    h+='<div class="dtype">'+day.type+"</div>";
    h+='<div class="dtopic">'+day.topic+"</div></div>";
  }
  h+="</div>";
  if(d){
    h+='<div class="panel"><div class="phdr">';
    h+='<span class="dbadge">Day '+d.day+"</span>";
    h+='<div class="pinfo"><div class="ptitle">'+d.type+"</div>";
    h+='<div class="pmeta">'+d.topic+"</div></div></div>";
    h+='<div class="nrow"><span class="nlbl">Your niche:</span><div class="chips">';
    for(var n=0;n<NICHES.length;n++){
      h+='<span class="chip'+(NICHES[n]===S.niche?" on":"")+'" data-niche="'+NICHES[n]+'">'+NICHES[n]+"</span>";
    }
    h+="</div></div>";
    h+='<div class="out">';
    var plan=PLANS[key];
    h+='<div class="plan">'+(plan||"<p>Select a niche above to see your plan.</p>")+"</div>";
    h+="</div></div>";
  }
  h+='<div class="banner"><p><strong>The SHIFT Rule:</strong> Don\'t sell SHIFT — show what it helped you create. Curiosity converts better than promotion.</p></div>';
  document.getElementById("root").innerHTML=h;
  document.querySelectorAll(".wtab").forEach(function(el){
    el.addEventListener("click",function(){S.week=parseInt(this.dataset.wi);S.day=null;render();});
  });
  document.querySelectorAll(".dcard").forEach(function(el){
    el.addEventListener("click",function(){S.day=parseInt(this.dataset.day);render();});
  });
  document.querySelectorAll(".chip").forEach(function(el){
    el.addEventListener("click",function(){S.niche=this.dataset.niche;render();});
  });
}
render();
</script>
