function render(){
  var w=WEEKS[S.week];
  var d=S.day!==null?w.days.find(function(x){return x.day===S.day;}):null;
  var key=d?S.day+"-"+S.niche:null;
  var h="";
  h+='<div class="hdr"><div class="hdr-eye">30-Day Activation Protocol</div>';
  h+='<div class="hdr-title">SHIFT <span>Content</span> Planner</div>';
  h+='<div class="hdr-sub">Daily execution plans for all 30 days</div></div>';
  h+='<div class="wnav">';
  for(var i=0;i<WEEKS.length;i++){
    h+='<button class="wtab'+(i===S.week?" on":"")+'" data-wi="'+i+'">';
    h+='<span class="wtab-num">'+WEEKS[i].label+"</span><span>"+WEEKS[i].theme+"</span></button>";
  }
  h+="</div>";
  h+='<div class="wintro"><span class="gbadge">Goal</span><span class="gtext">'+w.goal+"</span></div>";
  h+='<div class="dgrid">';
  for(var j=0;j<w.days.length;j++){
    var day=w.days[j];
    h+='<div class="dcard'+(S.day===day.day?" on":"")+'" data-day="'+day.day+'">';
    h+='<div class="dnum">'+day.day+"</div>";
    h+='<div class="dtype">'+day.type+"</div>";
    h+='<div class="dtopic">'+day.topic+"</div></div>";
  }
  h+="</div>";
  if(d){
    h+='<div class="panel"><div class="phdr">';
    h+='<span class="dbadge">Day '+d.day+"</span>";
    h+='<div class="pinfo"><div class="ptitle">'+d.type+"</div>";
    h+='<div class="pmeta">'+d.topic+"</div></div></div>";
    h+='<div class="nrow"><span class="nlbl">Your niche:</span><div class="chips">';
    for(var n=0;n<NICHES.length;n++){
      h+='<span class="chip'+(NICHES[n]===S.niche?" on":"")+'" data-niche="'+NICHES[n]+'">'+NICHES[n]+"</span>";
    }
    h+="</div></div>";
    h+='<div class="out">';
    var plan=PLANS[key];
    if(plan){
      h+='<div class="plan">'+plan+"</div>";
    } else {
      h+='<div class="plan"><p>Select a niche above to see your Day '+d.day+' plan.</p></div>';
    }
    h+="</div></div>";
  }
  h+='<div class="banner"><p><strong>The SHIFT Rule:</strong> Don\'t sell SHIFT — show what it helped you create. Curiosity converts better than promotion.</p></div>';
  document.getElementById("root").innerHTML=h;
  document.querySelectorAll(".wtab").forEach(function(el){
    el.addEventListener("click",function(){S.week=parseInt(this.dataset.wi);S.day=null;render();});
  });
  document.querySelectorAll(".dcard").forEach(function(el){
    el.addEventListener("click",function(){S.day=parseInt(this.dataset.day);render();});
  });
  document.querySelectorAll(".chip").forEach(function(el){
    el.addEventListener("click",function(){S.niche=this.dataset.niche;render();});
  });
}
render();
</script>
